<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Schalke 04 vs Fortuna D&uuml;sseldorf</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #1a1a2e;
  font-family: 'Helvetica Neue', Arial, sans-serif;
}
#gameContainer {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
canvas {
  display: block;
  touch-action: none;
}

/* Start Screen */
#startScreen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #004d9e 0%, #1a1a2e 50%, #e4002b 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  gap: 20px;
}
#startScreen h1 {
  color: white;
  font-size: 22px;
  text-align: center;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  line-height: 1.3;
}
#startScreen .vs {
  font-size: 48px;
  color: #ffd700;
  font-weight: bold;
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
}
.team-badge {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 14px;
  color: white;
  text-align: center;
  border: 3px solid white;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.badge-schalke {
  background: radial-gradient(circle, #0055a4, #003d75);
}
.badge-fortuna {
  background: radial-gradient(circle, #e4002b, #a8001f);
}
.teams-row {
  display: flex;
  align-items: center;
  gap: 25px;
}
#startBtn {
  background: linear-gradient(to bottom, #ffd700, #e6b800);
  color: #1a1a2e;
  border: none;
  padding: 18px 50px;
  font-size: 22px;
  font-weight: bold;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,215,0,0.4);
  margin-top: 15px;
  letter-spacing: 1px;
}
#startBtn:active {
  transform: scale(0.95);
}
.instructions {
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  text-align: center;
  max-width: 300px;
  line-height: 1.5;
}

/* Goal Overlay */
#goalOverlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 50;
  background: rgba(0,0,0,0.6);
}
#goalOverlay .goal-text {
  font-size: 64px;
  font-weight: bold;
  color: #ffd700;
  text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4);
  animation: goalPulse 0.5s ease-in-out infinite alternate;
}
#goalOverlay .scorer {
  font-size: 24px;
  color: white;
  margin-top: 10px;
}
@keyframes goalPulse {
  from { transform: scale(1); }
  to { transform: scale(1.15); }
}

/* Win Screen */
#winScreen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 80;
  background: rgba(0,0,0,0.85);
  gap: 15px;
}
#winScreen h2 {
  color: #ffd700;
  font-size: 28px;
  text-align: center;
}
#winScreen .final-score {
  color: white;
  font-size: 48px;
  font-weight: bold;
}
#restartBtn {
  background: linear-gradient(to bottom, #ffd700, #e6b800);
  color: #1a1a2e;
  border: none;
  padding: 15px 40px;
  font-size: 20px;
  font-weight: bold;
  border-radius: 50px;
  cursor: pointer;
  margin-top: 10px;
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
</div>

<!-- Start Screen -->
<div id="startScreen">
  <h1>&#9917; FU&szlig;BALL DUELL &#9917;</h1>
  <div class="teams-row">
    <div class="team-badge badge-schalke">S04<br>Schalke</div>
    <div class="vs">VS</div>
    <div class="team-badge badge-fortuna">F95<br>Fortuna</div>
  </div>
  <button id="startBtn">ANSTOSS!</button>
  <div class="instructions">
    2-Spieler auf einem Ger&auml;t<br>
    Jeder Spieler steuert mit einem virtuellen Joystick auf seiner Seite.<br>
    Schuss-Button zum Schie&szlig;en!<br>
    Erstes Team mit 5 Toren gewinnt!
  </div>
</div>

<!-- Goal Overlay -->
<div id="goalOverlay">
  <div style="text-align:center">
    <div class="goal-text">TOOOR!</div>
    <div class="scorer" id="scorerText"></div>
  </div>
</div>

<!-- Win Screen -->
<div id="winScreen">
  <h2 id="winnerText"></h2>
  <div class="final-score" id="finalScore"></div>
  <button id="restartBtn">NOCHMAL SPIELEN</button>
</div>

<script>
// ===== GAME CONFIG =====
const WINNING_SCORE = 5;
const PLAYER_RADIUS = 18;
const BALL_RADIUS = 10;
const PLAYER_SPEED = 4.5;
const AI_NONE = true;
const SHOOT_POWER = 12;
const BALL_FRICTION = 0.985;
const BOUNCE_FACTOR = 0.7;
const GOAL_WIDTH_RATIO = 0.30;
const SHOOT_RANGE = 55;
const KICK_COOLDOWN = 300; // ms

// Team Colors
const SCHALKE = {
  name: 'Schalke 04',
  short: 'S04',
  primary: '#0055a4',
  secondary: '#ffffff',
  gk: '#ffd700'
};
const FORTUNA = {
  name: 'Fortuna Düsseldorf',
  short: 'F95',
  primary: '#e4002b',
  secondary: '#ffffff',
  gk: '#1a1a2e'
};

// ===== CANVAS SETUP =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, FIELD_X, FIELD_Y, FIELD_W, FIELD_H;
let GOAL_H, GOAL_DEPTH, CENTER_RADIUS;
let PENALTY_W, PENALTY_H;

function resizeCanvas() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;

  // Field dimensions with margins
  const margin = 10;
  FIELD_X = margin;
  FIELD_Y = 50;
  FIELD_W = W - margin * 2;
  FIELD_H = H - 100;
  GOAL_H = FIELD_H * GOAL_WIDTH_RATIO;
  GOAL_DEPTH = 25;
  CENTER_RADIUS = Math.min(FIELD_W, FIELD_H) * 0.12;
  PENALTY_W = FIELD_W * 0.18;
  PENALTY_H = GOAL_H * 1.6;
}
resizeCanvas();
window.addEventListener('resize', () => {
  resizeCanvas();
  if (gameState === 'playing') resetPositions();
});

// ===== GAME STATE =====
let gameState = 'menu'; // menu, playing, goal, finished
let score = { left: 0, right: 0 };

// Ball
let ball = { x: 0, y: 0, vx: 0, vy: 0 };

// Players: each team has 4 field players + 1 goalkeeper
// Formations stored as ratios of field
function createTeams() {
  const leftFormation = [
    { rx: 0.08, ry: 0.5, isGK: true },
    { rx: 0.22, ry: 0.25 },
    { rx: 0.22, ry: 0.75 },
    { rx: 0.35, ry: 0.4 },
    { rx: 0.35, ry: 0.6 },
    { rx: 0.45, ry: 0.5 }
  ];
  const rightFormation = [
    { rx: 0.92, ry: 0.5, isGK: true },
    { rx: 0.78, ry: 0.25 },
    { rx: 0.78, ry: 0.75 },
    { rx: 0.65, ry: 0.4 },
    { rx: 0.65, ry: 0.6 },
    { rx: 0.55, ry: 0.5 }
  ];
  return { left: leftFormation, right: rightFormation };
}

let teams = createTeams();
let players = [];
let selectedPlayer = { left: null, right: null };
let lastKickTime = { left: 0, right: 0 };

function initPlayers() {
  players = [];
  teams.left.forEach((p, i) => {
    players.push({
      team: 'left',
      teamData: SCHALKE,
      x: FIELD_X + p.rx * FIELD_W,
      y: FIELD_Y + p.ry * FIELD_H,
      homeX: FIELD_X + p.rx * FIELD_W,
      homeY: FIELD_Y + p.ry * FIELD_H,
      vx: 0, vy: 0,
      isGK: p.isGK || false,
      idx: i
    });
  });
  teams.right.forEach((p, i) => {
    players.push({
      team: 'right',
      teamData: FORTUNA,
      x: FIELD_X + p.rx * FIELD_W,
      y: FIELD_Y + p.ry * FIELD_H,
      homeX: FIELD_X + p.rx * FIELD_W,
      homeY: FIELD_Y + p.ry * FIELD_H,
      vx: 0, vy: 0,
      isGK: p.isGK || false,
      idx: i
    });
  });
  // Select nearest to ball for each team
  updateSelectedPlayers();
}

function updateSelectedPlayers() {
  let minDistL = Infinity, minDistR = Infinity;
  players.forEach(p => {
    const d = Math.hypot(p.x - ball.x, p.y - ball.y);
    if (p.team === 'left' && d < minDistL) {
      minDistL = d;
      selectedPlayer.left = p;
    }
    if (p.team === 'right' && d < minDistR) {
      minDistR = d;
      selectedPlayer.right = p;
    }
  });
}

function resetPositions() {
  teams = createTeams();
  initPlayers();
  ball.x = FIELD_X + FIELD_W / 2;
  ball.y = FIELD_Y + FIELD_H / 2;
  ball.vx = 0;
  ball.vy = 0;
}

// ===== TOUCH CONTROLS =====
let touches = {};
let joystick = {
  left: { active: false, startX: 0, startY: 0, currX: 0, currY: 0, id: null },
  right: { active: false, startX: 0, startY: 0, currX: 0, currY: 0, id: null }
};
let shootBtn = {
  left: { pressed: false, id: null },
  right: { pressed: false, id: null }
};

// Shoot button positions
function getShootBtnPos(side) {
  if (side === 'left') {
    return { x: W * 0.38, y: H - 45, r: 32 };
  } else {
    return { x: W * 0.62, y: H - 45, r: 32 };
  }
}

function getJoystickZone(side) {
  if (side === 'left') {
    return { x: 0, y: H * 0.45, w: W * 0.45, h: H * 0.55 };
  } else {
    return { x: W * 0.55, y: H * 0.45, w: W * 0.45, h: H * 0.55 };
  }
}

canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

function handleTouchStart(e) {
  e.preventDefault();
  if (gameState !== 'playing') return;

  for (let t of e.changedTouches) {
    const tx = t.clientX, ty = t.clientY;
    const id = t.identifier;

    // Check shoot buttons first
    for (let side of ['left', 'right']) {
      const btn = getShootBtnPos(side);
      if (Math.hypot(tx - btn.x, ty - btn.y) < btn.r + 10) {
        shootBtn[side].pressed = true;
        shootBtn[side].id = id;
        performShoot(side);
        return;
      }
    }

    // Check joystick zones
    for (let side of ['left', 'right']) {
      const zone = getJoystickZone(side);
      if (!joystick[side].active &&
          tx >= zone.x && tx <= zone.x + zone.w &&
          ty >= zone.y && ty <= zone.y + zone.h) {
        joystick[side].active = true;
        joystick[side].startX = tx;
        joystick[side].startY = ty;
        joystick[side].currX = tx;
        joystick[side].currY = ty;
        joystick[side].id = id;
        break;
      }
    }
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  if (gameState !== 'playing') return;

  for (let t of e.changedTouches) {
    for (let side of ['left', 'right']) {
      if (joystick[side].active && joystick[side].id === t.identifier) {
        joystick[side].currX = t.clientX;
        joystick[side].currY = t.clientY;
      }
    }
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  for (let t of e.changedTouches) {
    for (let side of ['left', 'right']) {
      if (joystick[side].id === t.identifier) {
        joystick[side].active = false;
        joystick[side].id = null;
      }
      if (shootBtn[side].id === t.identifier) {
        shootBtn[side].pressed = false;
        shootBtn[side].id = null;
      }
    }
  }
}

// ===== KEYBOARD SUPPORT (for testing on desktop) =====
let keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

function performShoot(side) {
  const now = Date.now();
  if (now - lastKickTime[side] < KICK_COOLDOWN) return;

  const player = selectedPlayer[side];
  if (!player) return;

  const dx = ball.x - player.x;
  const dy = ball.y - player.y;
  const dist = Math.hypot(dx, dy);

  if (dist < SHOOT_RANGE) {
    lastKickTime[side] = now;
    const angle = Math.atan2(dy, dx);
    ball.vx = Math.cos(angle) * SHOOT_POWER;
    ball.vy = Math.sin(angle) * SHOOT_POWER;
    // Slight push on player
    player.x -= Math.cos(angle) * 3;
    player.y -= Math.sin(angle) * 3;
  }
}

// ===== GAME LOGIC =====
function update() {
  if (gameState !== 'playing') return;

  // --- Move controlled players ---
  for (let side of ['left', 'right']) {
    const p = selectedPlayer[side];
    if (!p) continue;

    let dx = 0, dy = 0;

    if (joystick[side].active) {
      dx = joystick[side].currX - joystick[side].startX;
      dy = joystick[side].currY - joystick[side].startY;
      const mag = Math.hypot(dx, dy);
      const maxDist = 50;
      if (mag > maxDist) {
        dx = (dx / mag) * maxDist;
        dy = (dy / mag) * maxDist;
        // Recenter joystick
        joystick[side].startX = joystick[side].currX - dx;
        joystick[side].startY = joystick[side].currY - dy;
      }
      dx = (dx / maxDist) * PLAYER_SPEED;
      dy = (dy / maxDist) * PLAYER_SPEED;
    }

    // Keyboard fallback (WASD for left, Arrows for right)
    if (side === 'left') {
      if (keys['w'] || keys['W']) dy -= PLAYER_SPEED;
      if (keys['s'] || keys['S']) dy += PLAYER_SPEED;
      if (keys['a'] || keys['A']) dx -= PLAYER_SPEED;
      if (keys['d'] || keys['D']) dx += PLAYER_SPEED;
      if (keys[' ']) performShoot('left');
    } else {
      if (keys['ArrowUp']) dy -= PLAYER_SPEED;
      if (keys['ArrowDown']) dy += PLAYER_SPEED;
      if (keys['ArrowLeft']) dx -= PLAYER_SPEED;
      if (keys['ArrowRight']) dx += PLAYER_SPEED;
      if (keys['Enter']) performShoot('right');
    }

    p.x += dx;
    p.y += dy;

    // Clamp to field
    p.x = Math.max(FIELD_X + PLAYER_RADIUS, Math.min(FIELD_X + FIELD_W - PLAYER_RADIUS, p.x));
    p.y = Math.max(FIELD_Y + PLAYER_RADIUS, Math.min(FIELD_Y + FIELD_H - PLAYER_RADIUS, p.y));
  }

  // --- AI for non-selected players ---
  players.forEach(p => {
    if (p === selectedPlayer.left || p === selectedPlayer.right) return;

    // Simple AI: drift toward ball but stay near home position
    const toBallX = ball.x - p.x;
    const toBallY = ball.y - p.y;
    const toBallDist = Math.hypot(toBallX, toBallY);

    const toHomeX = p.homeX - p.x;
    const toHomeY = p.homeY - p.y;
    const toHomeDist = Math.hypot(toHomeX, toHomeY);

    let moveX = 0, moveY = 0;

    if (p.isGK) {
      // Goalkeeper: track ball Y but stay near goal line
      const targetY = Math.max(
        FIELD_Y + FIELD_H / 2 - GOAL_H / 2 + PLAYER_RADIUS,
        Math.min(FIELD_Y + FIELD_H / 2 + GOAL_H / 2 - PLAYER_RADIUS, ball.y)
      );
      moveY = (targetY - p.y) * 0.08;
      moveX = (p.homeX - p.x) * 0.1;
    } else {
      // Field players: balance between ball and home
      const ballWeight = Math.max(0, 1 - toBallDist / 250) * 0.6;
      const homeWeight = 0.04;

      if (toBallDist > 0) {
        moveX += (toBallX / toBallDist) * PLAYER_SPEED * 0.6 * ballWeight;
        moveY += (toBallY / toBallDist) * PLAYER_SPEED * 0.6 * ballWeight;
      }
      if (toHomeDist > 20) {
        moveX += (toHomeX / toHomeDist) * PLAYER_SPEED * homeWeight;
        moveY += (toHomeY / toHomeDist) * PLAYER_SPEED * homeWeight;
      }

      // Limit speed
      const speed = Math.hypot(moveX, moveY);
      if (speed > PLAYER_SPEED * 0.5) {
        moveX = (moveX / speed) * PLAYER_SPEED * 0.5;
        moveY = (moveY / speed) * PLAYER_SPEED * 0.5;
      }
    }

    p.x += moveX;
    p.y += moveY;
    p.x = Math.max(FIELD_X + PLAYER_RADIUS, Math.min(FIELD_X + FIELD_W - PLAYER_RADIUS, p.x));
    p.y = Math.max(FIELD_Y + PLAYER_RADIUS, Math.min(FIELD_Y + FIELD_H - PLAYER_RADIUS, p.y));

    // AI auto-kick when close to ball
    if (toBallDist < PLAYER_RADIUS + BALL_RADIUS + 5) {
      const ownGoalX = p.team === 'left' ? FIELD_X : FIELD_X + FIELD_W;
      const targetGoalX = p.team === 'left' ? FIELD_X + FIELD_W : FIELD_X;
      const targetGoalY = FIELD_Y + FIELD_H / 2;

      const kickAngle = Math.atan2(targetGoalY - p.y, targetGoalX - p.x);
      ball.vx += Math.cos(kickAngle) * 3;
      ball.vy += Math.sin(kickAngle) * 2;
    }
  });

  // --- Ball physics ---
  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.vx *= BALL_FRICTION;
  ball.vy *= BALL_FRICTION;

  // Ball-player collision
  players.forEach(p => {
    const dx = ball.x - p.x;
    const dy = ball.y - p.y;
    const dist = Math.hypot(dx, dy);
    const minDist = PLAYER_RADIUS + BALL_RADIUS;

    if (dist < minDist && dist > 0) {
      // Push ball out
      const overlap = minDist - dist;
      const nx = dx / dist;
      const ny = dy / dist;
      ball.x += nx * overlap;
      ball.y += ny * overlap;

      // Bounce
      const dot = ball.vx * nx + ball.vy * ny;
      ball.vx -= dot * nx;
      ball.vy -= dot * ny;
      ball.vx += nx * 2;
      ball.vy += ny * 2;
    }
  });

  // Player-player collision
  for (let i = 0; i < players.length; i++) {
    for (let j = i + 1; j < players.length; j++) {
      const a = players[i], b = players[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      const minDist = PLAYER_RADIUS * 2;
      if (dist < minDist && dist > 0) {
        const overlap = (minDist - dist) / 2;
        const nx = dx / dist;
        const ny = dy / dist;
        a.x -= nx * overlap;
        a.y -= ny * overlap;
        b.x += nx * overlap;
        b.y += ny * overlap;
      }
    }
  }

  // Goal detection
  const goalTop = FIELD_Y + FIELD_H / 2 - GOAL_H / 2;
  const goalBottom = FIELD_Y + FIELD_H / 2 + GOAL_H / 2;

  // Left goal (Fortuna scores)
  if (ball.x - BALL_RADIUS <= FIELD_X && ball.y >= goalTop && ball.y <= goalBottom) {
    score.right++;
    showGoal(FORTUNA.name);
    return;
  }
  // Right goal (Schalke scores)
  if (ball.x + BALL_RADIUS >= FIELD_X + FIELD_W && ball.y >= goalTop && ball.y <= goalBottom) {
    score.left++;
    showGoal(SCHALKE.name);
    return;
  }

  // Wall bouncing
  if (ball.x - BALL_RADIUS < FIELD_X) {
    ball.x = FIELD_X + BALL_RADIUS;
    ball.vx = Math.abs(ball.vx) * BOUNCE_FACTOR;
  }
  if (ball.x + BALL_RADIUS > FIELD_X + FIELD_W) {
    ball.x = FIELD_X + FIELD_W - BALL_RADIUS;
    ball.vx = -Math.abs(ball.vx) * BOUNCE_FACTOR;
  }
  if (ball.y - BALL_RADIUS < FIELD_Y) {
    ball.y = FIELD_Y + BALL_RADIUS;
    ball.vy = Math.abs(ball.vy) * BOUNCE_FACTOR;
  }
  if (ball.y + BALL_RADIUS > FIELD_Y + FIELD_H) {
    ball.y = FIELD_Y + FIELD_H - BALL_RADIUS;
    ball.vy = -Math.abs(ball.vy) * BOUNCE_FACTOR;
  }

  // Update selected players (closest to ball)
  updateSelectedPlayers();

  // Slow stop
  if (Math.abs(ball.vx) < 0.05) ball.vx = 0;
  if (Math.abs(ball.vy) < 0.05) ball.vy = 0;
}

function showGoal(teamName) {
  gameState = 'goal';
  document.getElementById('scorerText').textContent = teamName + '!';
  document.getElementById('goalOverlay').style.display = 'flex';

  setTimeout(() => {
    document.getElementById('goalOverlay').style.display = 'none';
    if (score.left >= WINNING_SCORE || score.right >= WINNING_SCORE) {
      showWin();
    } else {
      resetPositions();
      gameState = 'playing';
    }
  }, 2000);
}

function showWin() {
  gameState = 'finished';
  const winner = score.left >= WINNING_SCORE ? SCHALKE.name : FORTUNA.name;
  document.getElementById('winnerText').textContent = '🏆 ' + winner + ' gewinnt! 🏆';
  document.getElementById('finalScore').textContent = score.left + ' : ' + score.right;
  document.getElementById('winScreen').style.display = 'flex';
}

// ===== DRAWING =====
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  drawField();
  drawPlayers();
  drawBall();
  drawUI();
  drawControls();
}

function drawField() {
  // Green pitch
  ctx.fillStyle = '#2d8a4e';
  ctx.fillRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);

  // Stripes
  const stripeW = FIELD_W / 12;
  for (let i = 0; i < 12; i += 2) {
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(FIELD_X + i * stripeW, FIELD_Y, stripeW, FIELD_H);
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;

  // Outline
  ctx.strokeRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);

  // Center line
  ctx.beginPath();
  ctx.moveTo(FIELD_X + FIELD_W / 2, FIELD_Y);
  ctx.lineTo(FIELD_X + FIELD_W / 2, FIELD_Y + FIELD_H);
  ctx.stroke();

  // Center circle
  ctx.beginPath();
  ctx.arc(FIELD_X + FIELD_W / 2, FIELD_Y + FIELD_H / 2, CENTER_RADIUS, 0, Math.PI * 2);
  ctx.stroke();

  // Center dot
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(FIELD_X + FIELD_W / 2, FIELD_Y + FIELD_H / 2, 4, 0, Math.PI * 2);
  ctx.fill();

  // Penalty areas
  const penW = PENALTY_W;
  const penH = PENALTY_H;
  // Left
  ctx.strokeRect(FIELD_X, FIELD_Y + FIELD_H / 2 - penH / 2, penW, penH);
  // Right
  ctx.strokeRect(FIELD_X + FIELD_W - penW, FIELD_Y + FIELD_H / 2 - penH / 2, penW, penH);

  // Goals
  const goalTop = FIELD_Y + FIELD_H / 2 - GOAL_H / 2;
  ctx.lineWidth = 4;

  // Left goal
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(FIELD_X - GOAL_DEPTH, goalTop, GOAL_DEPTH, GOAL_H);
  ctx.strokeRect(FIELD_X - GOAL_DEPTH, goalTop, GOAL_DEPTH, GOAL_H);

  // Right goal
  ctx.fillRect(FIELD_X + FIELD_W, goalTop, GOAL_DEPTH, GOAL_H);
  ctx.strokeRect(FIELD_X + FIELD_W, goalTop, GOAL_DEPTH, GOAL_H);

  // Goal net lines
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < GOAL_H; i += 8) {
    // Left net
    ctx.beginPath();
    ctx.moveTo(FIELD_X - GOAL_DEPTH, goalTop + i);
    ctx.lineTo(FIELD_X, goalTop + i);
    ctx.stroke();
    // Right net
    ctx.beginPath();
    ctx.moveTo(FIELD_X + FIELD_W, goalTop + i);
    ctx.lineTo(FIELD_X + FIELD_W + GOAL_DEPTH, goalTop + i);
    ctx.stroke();
  }
}

function drawPlayers() {
  players.forEach(p => {
    const isSelected = (p === selectedPlayer.left || p === selectedPlayer.right);

    // Selection indicator
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, PLAYER_RADIUS + 6, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2.5;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Arrow pointing to ball
      const dx = ball.x - p.x;
      const dy = ball.y - p.y;
      const dist = Math.hypot(dx, dy);
      if (dist > PLAYER_RADIUS + BALL_RADIUS + 15) {
        const angle = Math.atan2(dy, dx);
        const arrowDist = PLAYER_RADIUS + 10;
        const ax = p.x + Math.cos(angle) * arrowDist;
        const ay = p.y + Math.sin(angle) * arrowDist;
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(ax, ay, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(p.x + 2, p.y + 3, PLAYER_RADIUS, PLAYER_RADIUS * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Player body
    const color = p.isGK ? p.teamData.gk : p.teamData.primary;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Border
    ctx.strokeStyle = p.teamData.secondary;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Inner shirt detail
    ctx.fillStyle = p.teamData.secondary;
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_RADIUS * 0.35, 0, Math.PI * 2);
    ctx.fill();

    // Team letter
    ctx.fillStyle = p.isGK ? '#000' : p.teamData.secondary;
    ctx.font = `bold ${PLAYER_RADIUS * 0.7}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.teamData.short[0], p.x, p.y + 1);
  });
}

function drawBall() {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(ball.x + 2, ball.y + 3, BALL_RADIUS, BALL_RADIUS * 0.7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ball
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Pentagon pattern
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_RADIUS * 0.45, 0, Math.PI * 2);
  ctx.fill();

  // Speed trail
  const speed = Math.hypot(ball.vx, ball.vy);
  if (speed > 3) {
    const alpha = Math.min(0.4, speed / 20);
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ball.x, ball.y);
    ctx.lineTo(ball.x - ball.vx * 3, ball.y - ball.vy * 3);
    ctx.stroke();
  }
}

function drawUI() {
  // Score bar
  const barH = 44;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, barH);

  // Schalke side
  ctx.fillStyle = SCHALKE.primary;
  ctx.fillRect(0, 0, W / 2 - 30, barH);

  // Fortuna side
  ctx.fillStyle = FORTUNA.primary;
  ctx.fillRect(W / 2 + 30, 0, W / 2 - 30, barH);

  // Score display
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Team names
  ctx.font = 'bold 13px Arial';
  ctx.fillText(SCHALKE.short, W * 0.15, barH / 2 - 10);
  ctx.fillText(FORTUNA.short, W * 0.85, barH / 2 - 10);

  // Scores
  ctx.font = 'bold 20px Arial';
  ctx.fillText(String(score.left), W * 0.15, barH / 2 + 10);
  ctx.fillText(String(score.right), W * 0.85, barH / 2 + 10);

  // Center score
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 24px Arial';
  ctx.fillText(score.left + ' : ' + score.right, W / 2, barH / 2);
}

function drawControls() {
  if (gameState !== 'playing') return;

  // Draw joysticks
  for (let side of ['left', 'right']) {
    if (joystick[side].active) {
      // Outer ring
      ctx.beginPath();
      ctx.arc(joystick[side].startX, joystick[side].startY, 45, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Inner thumb
      const dx = joystick[side].currX - joystick[side].startX;
      const dy = joystick[side].currY - joystick[side].startY;
      const dist = Math.min(Math.hypot(dx, dy), 45);
      const angle = Math.atan2(dy, dx);
      const thumbX = joystick[side].startX + Math.cos(angle) * dist;
      const thumbY = joystick[side].startY + Math.sin(angle) * dist;

      ctx.beginPath();
      ctx.arc(thumbX, thumbY, 20, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fill();
    }

    // Shoot button
    const btn = getShootBtnPos(side);
    const color = side === 'left' ? SCHALKE.primary : FORTUNA.primary;
    const pressed = shootBtn[side].pressed;

    ctx.beginPath();
    ctx.arc(btn.x, btn.y, btn.r, 0, Math.PI * 2);
    ctx.fillStyle = pressed ? '#ffd700' : color;
    ctx.globalAlpha = pressed ? 0.9 : 0.7;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SCHUSS', btn.x, btn.y);
  }

  // Zone indicators (subtle)
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  const lz = getJoystickZone('left');
  ctx.fillRect(lz.x, lz.y, lz.w, lz.h);
  const rz = getJoystickZone('right');
  ctx.fillRect(rz.x, rz.y, rz.w, rz.h);

  // Control hints at bottom
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('← ' + SCHALKE.short + ' Joystick', W * 0.15, H - 8);
  ctx.fillText(FORTUNA.short + ' Joystick →', W * 0.85, H - 8);
}

// ===== GAME LOOP =====
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ===== START =====
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startScreen').style.display = 'none';
  score = { left: 0, right: 0 };
  resetPositions();
  gameState = 'playing';
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('winScreen').style.display = 'none';
  score = { left: 0, right: 0 };
  resetPositions();
  gameState = 'playing';
});

// Init
resetPositions();
gameLoop();
</script>
