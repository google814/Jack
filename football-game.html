<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Schalke 04 vs Fortuna D&uuml;sseldorf</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #1a1a2e;
  font-family: 'Helvetica Neue', Arial, sans-serif;
}
#gameContainer {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
canvas {
  touch-action: none;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}
/* Buttons must be clickable on iPad */
button, .team-select-btn {
  cursor: pointer;
  -webkit-tap-highlight-color: rgba(255,255,255,0.2);
}

/* Start Screen */
#startScreen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #004d9e 0%, #1a1a2e 50%, #e4002b 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  gap: 18px;
}
#startScreen h1 {
  color: white;
  font-size: clamp(22px, 3.5vmin, 36px);
  text-align: center;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  line-height: 1.3;
}
#startScreen .vs {
  font-size: 48px;
  color: #ffd700;
  font-weight: bold;
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
}
.team-badge {
  width: clamp(90px, 12vmin, 130px);
  height: clamp(90px, 12vmin, 130px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: clamp(14px, 2vmin, 20px);
  color: white;
  text-align: center;
  border: 3px solid white;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.badge-schalke {
  background: radial-gradient(circle, #0055a4, #003d75);
}
.badge-fortuna {
  background: radial-gradient(circle, #e4002b, #a8001f);
}
.teams-row {
  display: flex;
  align-items: center;
  gap: 25px;
}
.mode-buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 5px;
}
.mode-btn {
  background: linear-gradient(to bottom, #ffd700, #e6b800);
  color: #1a1a2e;
  border: none;
  padding: clamp(16px, 2.5vmin, 22px) clamp(44px, 6vmin, 60px);
  font-size: clamp(18px, 2.8vmin, 26px);
  font-weight: bold;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,215,0,0.4);
  letter-spacing: 1px;
  min-width: clamp(260px, 35vmin, 360px);
}
.mode-btn:active {
  transform: scale(0.95);
}
.mode-btn.secondary {
  background: linear-gradient(to bottom, #ffffff, #dddddd);
  box-shadow: 0 4px 15px rgba(255,255,255,0.2);
}
.instructions {
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  text-align: center;
  max-width: 300px;
  line-height: 1.5;
}

/* Team Select Screen */
#teamSelectScreen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #004d9e 0%, #1a1a2e 50%, #e4002b 100%);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 99;
  gap: 20px;
}
#teamSelectScreen h2 {
  color: white;
  font-size: 20px;
  text-align: center;
}
.team-select-row {
  display: flex;
  gap: 30px;
}
.team-select-btn {
  width: clamp(120px, 15vmin, 170px);
  height: clamp(120px, 15vmin, 170px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: clamp(16px, 2.5vmin, 24px);
  color: white;
  text-align: center;
  border: 4px solid white;
  cursor: pointer;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  transition: transform 0.2s;
}
.team-select-btn:active {
  transform: scale(0.92);
}
.team-select-btn.schalke-sel {
  background: radial-gradient(circle, #0055a4, #003d75);
}
.team-select-btn.fortuna-sel {
  background: radial-gradient(circle, #e4002b, #a8001f);
}

/* Goal Overlay */
#goalOverlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 50;
  background: rgba(0,0,0,0.6);
}
#goalOverlay .goal-text {
  font-size: clamp(64px, 10vmin, 96px);
  font-weight: bold;
  color: #ffd700;
  text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4);
  animation: goalPulse 0.5s ease-in-out infinite alternate;
}
#goalOverlay .scorer {
  font-size: clamp(24px, 3.5vmin, 36px);
  color: white;
  margin-top: 10px;
}
@keyframes goalPulse {
  from { transform: scale(1); }
  to { transform: scale(1.15); }
}

/* Win Screen */
#winScreen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 80;
  background: rgba(0,0,0,0.85);
  gap: 15px;
}
#winScreen h2 {
  color: #ffd700;
  font-size: 28px;
  text-align: center;
}
#winScreen .final-score {
  color: white;
  font-size: 48px;
  font-weight: bold;
}
#restartBtn {
  background: linear-gradient(to bottom, #ffd700, #e6b800);
  color: #1a1a2e;
  border: none;
  padding: 15px 40px;
  font-size: 20px;
  font-weight: bold;
  border-radius: 50px;
  cursor: pointer;
  margin-top: 10px;
}
#menuBtn {
  background: linear-gradient(to bottom, #ffffff, #dddddd);
  color: #1a1a2e;
  border: none;
  padding: 12px 35px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 50px;
  cursor: pointer;
}

/* Difficulty Select Screen */
#difficultyScreen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #004d9e 0%, #1a1a2e 50%, #e4002b 100%);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 98;
  gap: 14px;
}
#difficultyScreen h2 {
  color: white;
  font-size: 20px;
  text-align: center;
  margin-bottom: 5px;
}
.diff-btn {
  border: none;
  padding: clamp(16px, 2.5vmin, 22px) clamp(40px, 6vmin, 56px);
  font-size: clamp(18px, 2.8vmin, 26px);
  font-weight: bold;
  border-radius: 50px;
  cursor: pointer;
  min-width: clamp(250px, 35vmin, 360px);
  letter-spacing: 1px;
  color: white;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.diff-btn:active {
  transform: scale(0.95);
}
.diff-easy {
  background: linear-gradient(to bottom, #4CAF50, #388E3C);
}
.diff-medium {
  background: linear-gradient(to bottom, #FF9800, #F57C00);
}
.diff-hard {
  background: linear-gradient(to bottom, #f44336, #C62828);
}
.diff-desc {
  color: rgba(255,255,255,0.6);
  font-size: 11px;
  text-align: center;
  max-width: 280px;
}

</style>
</head>
<body ontouchstart="">
<div id="gameContainer">
  <canvas id="gameCanvas" style="display:none;"></canvas>
</div>

<!-- Start Screen -->
<div id="startScreen">
  <h1>&#9917; FUSSBALL DUELL &#9917;</h1>
  <div class="teams-row">
    <div class="team-badge badge-schalke">S04<br>Schalke</div>
    <div class="vs">VS</div>
    <div class="team-badge badge-fortuna">F95<br>Fortuna</div>
  </div>
  <div class="mode-buttons">
    <button class="mode-btn" id="btnVsComputer">&#129302; GEGEN COMPUTER</button>

<!-- Team Select Screen (for 1P mode) -->
<div id="teamSelectScreen">

  <div class="team-select-row">
    <button class="team-select-btn schalke-sel" id="selSchalke">S04<br>Schalke</button>

  </div>
</div>

<!-- Win Screen -->
<div id="winScreen">
  <h2 id="winnerText"></h2>
  <div class="final-score" id="finalScore"></div>
  <button id="restartBtn">NOCHMAL SPIELEN</button>
  <button id="menuBtn">HAUPTMEN&Uuml;</button>
</div>

<script>
// ===== GAME CONFIG =====
const WINNING_SCORE = 5;

// Scale factor based on screen size (iPad vs iPhone)
function getScale() {
  const diag = Math.hypot(window.innerWidth, window.innerHeight);
  // iPhone ~740px diagonal, iPad 11" ~1450px diagonal
  return Math.max(1, diag / 800);
}
let SCALE = getScale();

let PLAYER_RADIUS = Math.round(13 * SCALE);
let BALL_RADIUS = Math.round(7 * SCALE);
let PLAYER_SPEED = 4.5 * SCALE;
let SHOOT_POWER = 12 * SCALE;
const BALL_FRICTION = 0.985;
const BOUNCE_FACTOR = 0.7;
const GOAL_WIDTH_RATIO = 0.30;
let SHOOT_RANGE = Math.round(55 * SCALE);
const KICK_COOLDOWN = 300; // ms

// Team Colors
const SCHALKE = {
  name: 'Schalke 04',
  short: 'S04',
  primary: '#0055a4',
  secondary: '#ffffff',
  gk: '#ffd700'
};
const FORTUNA = {
  name: 'Fortuna D\u00fcsseldorf',
  short: 'F95',
  primary: '#e4002b',
  secondary: '#ffffff',
  gk: '#1a1a2e'
};

// ===== CANVAS SETUP =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let DPR = window.devicePixelRatio || 1;

let W, H, FIELD_X, FIELD_Y, FIELD_W, FIELD_H;
let GOAL_H, GOAL_DEPTH, CENTER_RADIUS;
let PENALTY_W, PENALTY_H;

function getTouchPos(touch) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: touch.clientX - rect.left,
    y: touch.clientY - rect.top
  };
}

function updateScaledValues() {
  SCALE = getScale();
  PLAYER_RADIUS = Math.round(13 * SCALE);
  BALL_RADIUS = Math.round(7 * SCALE);
  PLAYER_SPEED = 4.5 * SCALE;
  SHOOT_POWER = 12 * SCALE;
  SHOOT_RANGE = Math.round(55 * SCALE);
}

function resizeCanvas() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;

  // Set canvas internal resolution for sharp rendering
  canvas.width = W * DPR;
  canvas.height = H * DPR;

  // Scale context so we draw in CSS pixels
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  updateScaledValues();

  const borderPad = Math.round(20 * SCALE);
  const margin = Math.round(10 * SCALE);
  FIELD_X = margin + borderPad;
  FIELD_Y = Math.round(50 * SCALE) + borderPad;
  FIELD_W = W - (margin + borderPad) * 2;
  FIELD_H = H - FIELD_Y - Math.round(50 * SCALE) - borderPad;
  GOAL_H = FIELD_H * GOAL_WIDTH_RATIO;
  GOAL_DEPTH = Math.round(25 * SCALE);
  CENTER_RADIUS = Math.min(FIELD_W, FIELD_H) * 0.12;
  PENALTY_W = FIELD_W * 0.18;
  PENALTY_H = GOAL_H * 1.6;
}
resizeCanvas();
window.addEventListener('resize', () => {
  resizeCanvas();
  if (gameState === 'playing') resetPositions();
});
// Also handle orientation changes on iPad
window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    resizeCanvas();
    if (gameState === 'playing') resetPositions();
  }, 200);
});

// ===== GAME STATE =====
let gameState = 'menu'; // menu, teamselect, difficulty, playing, goal, finished
let gameMode = '2p'; // '1p' or '2p'
let playerTeamSide = 'left'; // which side the human controls in 1P mode
let cpuTeamSide = 'right';
let difficulty = 'easy'; // 'easy', 'medium', 'hard'
let score = { left: 0, right: 0 };

// Difficulty settings: controls how fast/smart/accurate the CPU is
const DIFFICULTY_SETTINGS = {
  easy: {
    moveSpeed: 0.35,       // fraction of PLAYER_SPEED (very slow)
    shootPower: 0.5,       // fraction of SHOOT_POWER (weak shots)
    shootAccuracy: 2.0,    // radians of random spread (very inaccurate)
    reactionDelay: 1200,   // ms between strategy changes (slow thinking)
    shootCooldown: 1500,   // ms between shots (shoots rarely)
    chaseRadius: 80,       // only chases ball when close
    missChance: 0.4,       // 40% chance to just miss/hesitate
    teammateKick: 1.0,     // weaker teammate auto-kicks
    gkSpeed: 0.03,         // goalkeeper tracking speed
  },
  medium: {
    moveSpeed: 0.6,
    shootPower: 0.7,
    shootAccuracy: 0.8,
    reactionDelay: 700,
    shootCooldown: 800,
    chaseRadius: 150,
    missChance: 0.15,
    teammateKick: 2.0,
    gkSpeed: 0.06,
  },
  hard: {
    moveSpeed: 0.85,
    shootPower: 0.95,
    shootAccuracy: 0.3,
    reactionDelay: 400,
    shootCooldown: 450,
    chaseRadius: 300,
    missChance: 0.0,
    teammateKick: 3.0,
    gkSpeed: 0.08,
  }
};

function getDiff() {
  return DIFFICULTY_SETTINGS[difficulty];
}

// Ball
let ball = { x: 0, y: 0, vx: 0, vy: 0 };

// CPU AI state
let cpuAI = {
  targetX: 0,
  targetY: 0,
  shootTimer: 0,
  thinkTimer: 0,
  strategy: 'chase',
  lastKickTime: 0,
  pauseUntil: 0  // hesitation timer for easy mode
};

// ===== LINESMEN =====
let linesmen = {
  top: { x: 0, y: 0, flagUp: false },
  bottom: { x: 0, y: 0, flagUp: false }
};

function updateLinesmen() {
  const pad = Math.round(12 * SCALE);
  // Top linesman: runs along top sideline, follows ball x
  const targetX = Math.max(FIELD_X, Math.min(FIELD_X + FIELD_W, ball.x));
  linesmen.top.x += (targetX - linesmen.top.x) * 0.06;
  linesmen.top.y = FIELD_Y - pad;
  // Bottom linesman: runs along bottom sideline
  linesmen.bottom.x += (targetX - linesmen.bottom.x) * 0.05;
  linesmen.bottom.y = FIELD_Y + FIELD_H + pad;
  // Flag up when ball is near their sideline
  linesmen.top.flagUp = ball.y < FIELD_Y + FIELD_H * 0.2;
  linesmen.bottom.flagUp = ball.y > FIELD_Y + FIELD_H * 0.8;
}

function resetLinesmen() {
  linesmen.top.x = FIELD_X + FIELD_W / 2;
  linesmen.top.y = FIELD_Y - Math.round(12 * SCALE);
  linesmen.bottom.x = FIELD_X + FIELD_W / 2;
  linesmen.bottom.y = FIELD_Y + FIELD_H + Math.round(12 * SCALE);
}

// ===== FIREWORK PARTICLES =====
let fireworks = [];

function createFireworks() {
  const colors = ['#ffd700', '#ff4444', '#44ff44', '#4488ff', '#ff44ff', '#ff8800', '#00ffff', '#ffffff'];
  for (let burst = 0; burst < 6; burst++) {
    const cx = FIELD_X + FIELD_W * (0.2 + Math.random() * 0.6);
    const cy = FIELD_Y + FIELD_H * (0.15 + Math.random() * 0.5);
    const color = colors[Math.floor(Math.random() * colors.length)];
    const particleCount = 25 + Math.floor(Math.random() * 20);
    for (let i = 0; i < particleCount; i++) {
      const angle = (Math.PI * 2 / particleCount) * i + (Math.random() - 0.5) * 0.3;
      const speed = 2 + Math.random() * 5;
      fireworks.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1,
        life: 1.0,
        decay: 0.008 + Math.random() * 0.012,
        color: color,
        size: 2 + Math.random() * 3,
        trail: [],
        sparkle: Math.random() < 0.3
      });
    }
  }
}

function updateFireworks() {
  for (let i = fireworks.length - 1; i >= 0; i--) {
    const p = fireworks[i];
    p.trail.push({ x: p.x, y: p.y, life: p.life });
    if (p.trail.length > 6) p.trail.shift();
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08; // gravity
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) {
      fireworks.splice(i, 1);
    }
  }
}

function drawFireworks() {
  fireworks.forEach(p => {
    // Draw trail
    for (let t = 0; t < p.trail.length; t++) {
      const tp = p.trail[t];
      const alpha = (t / p.trail.length) * p.life * 0.4;
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, p.size * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    // Draw particle
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    // Sparkle effect
    if (p.sparkle && Math.random() < 0.5) {
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = p.life * 0.8;
      ctx.beginPath();
      ctx.arc(p.x + (Math.random() - 0.5) * 4, p.y + (Math.random() - 0.5) * 4, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
}

function createTeams() {
  const leftFormation = [
    { rx: 0.08, ry: 0.5, isGK: true },
    { rx: 0.22, ry: 0.25 },
    { rx: 0.22, ry: 0.75 },
    { rx: 0.35, ry: 0.4 },
    { rx: 0.35, ry: 0.6 },
    { rx: 0.45, ry: 0.5 }
  ];
  const rightFormation = [
    { rx: 0.92, ry: 0.5, isGK: true },
    { rx: 0.78, ry: 0.25 },
    { rx: 0.78, ry: 0.75 },
    { rx: 0.65, ry: 0.4 },
    { rx: 0.65, ry: 0.6 },
    { rx: 0.55, ry: 0.5 }
  ];
  return { left: leftFormation, right: rightFormation };
}

let teams = createTeams();
let players = [];
let selectedPlayer = { left: null, right: null };
let lastKickTime = { left: 0, right: 0 };

function initPlayers() {
  players = [];
  teams.left.forEach((p, i) => {
    players.push({
      team: 'left',
      teamData: SCHALKE,
      x: FIELD_X + p.rx * FIELD_W,
      y: FIELD_Y + p.ry * FIELD_H,
      homeX: FIELD_X + p.rx * FIELD_W,
      homeY: FIELD_Y + p.ry * FIELD_H,
      vx: 0, vy: 0,
      isGK: p.isGK || false,
      idx: i
    });
  });
  teams.right.forEach((p, i) => {
    players.push({
      team: 'right',
      teamData: FORTUNA,
      x: FIELD_X + p.rx * FIELD_W,
      y: FIELD_Y + p.ry * FIELD_H,
      homeX: FIELD_X + p.rx * FIELD_W,
      homeY: FIELD_Y + p.ry * FIELD_H,
      vx: 0, vy: 0,
      isGK: p.isGK || false,
      idx: i
    });
  });
  updateSelectedPlayers();
}

function updateSelectedPlayers() {
  let minDistL = Infinity, minDistR = Infinity;
  players.forEach(p => {
    const d = Math.hypot(p.x - ball.x, p.y - ball.y);
    if (p.team === 'left' && d < minDistL) {
      minDistL = d;
      selectedPlayer.left = p;
    }
    if (p.team === 'right' && d < minDistR) {
      minDistR = d;
      selectedPlayer.right = p;
    }
  });
}

function resetPositions() {
  teams = createTeams();
  initPlayers();
  ball.x = FIELD_X + FIELD_W / 2;
  ball.y = FIELD_Y + FIELD_H / 2;
  ball.vx = 0;
  ball.vy = 0;
  resetLinesmen();
}

// ===== PREVENT ZOOM/SCROLL DURING GAMEPLAY =====
// Block pinch-zoom and double-tap zoom on whole page
document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('gestureend', e => e.preventDefault(), { passive: false });
// Block scroll only during gameplay
document.addEventListener('touchmove', function(e) {
  if (gameState === 'playing') e.preventDefault();
}, { passive: false });

// ===== TOUCH CONTROLS =====
let joystick = {
  left: { active: false, startX: 0, startY: 0, currX: 0, currY: 0, id: null },
  right: { active: false, startX: 0, startY: 0, currX: 0, currY: 0, id: null }
};
let shootBtn = {
  left: { pressed: false, id: null },
  right: { pressed: false, id: null }
};

function getShootBtnPos(side) {
  const btnR = Math.round(32 * SCALE);
  if (gameMode === '1p') {
    return { x: W - Math.round(60 * SCALE), y: H - Math.round(70 * SCALE), r: Math.round(38 * SCALE) };
  }
  if (side === 'left') {
    return { x: W * 0.38, y: H - Math.round(45 * SCALE), r: btnR };
  } else {
    return { x: W * 0.62, y: H - Math.round(45 * SCALE), r: btnR };
  }
}

function getJoystickZone(side) {
  if (gameMode === '1p') {
    // In 1P: larger joystick zone on the left 2/3
    return { x: 0, y: H * 0.4, w: W * 0.65, h: H * 0.6 };
  }
  if (side === 'left') {
    return { x: 0, y: H * 0.45, w: W * 0.45, h: H * 0.55 };
  } else {
    return { x: W * 0.55, y: H * 0.45, w: W * 0.45, h: H * 0.55 };
  }
}

// Touch listeners - only on canvas to avoid blocking UI buttons
canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

function handleTouchStart(e) {
  if (gameState !== 'playing') return;
  e.preventDefault();

  for (let t of e.changedTouches) {
    const id = t.identifier;
    const pos = getTouchPos(t);
    const tx = pos.x, ty = pos.y;

    if (gameMode === '1p') {
      const btn = getShootBtnPos(playerTeamSide);
      if (Math.hypot(tx - btn.x, ty - btn.y) < btn.r + 15 * SCALE) {
        shootBtn[playerTeamSide].pressed = true;
        shootBtn[playerTeamSide].id = id;
        performShoot(playerTeamSide);
        return;
      }
      const zone = getJoystickZone(playerTeamSide);
      if (!joystick[playerTeamSide].active &&
          tx >= zone.x && tx <= zone.x + zone.w &&
          ty >= zone.y && ty <= zone.y + zone.h) {
        joystick[playerTeamSide].active = true;
        joystick[playerTeamSide].startX = tx;
        joystick[playerTeamSide].startY = ty;
        joystick[playerTeamSide].currX = tx;
        joystick[playerTeamSide].currY = ty;
        joystick[playerTeamSide].id = id;
      }
    } else {
      for (let side of ['left', 'right']) {
        const btn = getShootBtnPos(side);
        if (Math.hypot(tx - btn.x, ty - btn.y) < btn.r + 15 * SCALE) {
          shootBtn[side].pressed = true;
          shootBtn[side].id = id;
          performShoot(side);
          return;
        }
      }
      for (let side of ['left', 'right']) {
        const zone = getJoystickZone(side);
        if (!joystick[side].active &&
            tx >= zone.x && tx <= zone.x + zone.w &&
            ty >= zone.y && ty <= zone.y + zone.h) {
          joystick[side].active = true;
          joystick[side].startX = tx;
          joystick[side].startY = ty;
          joystick[side].currX = tx;
          joystick[side].currY = ty;
          joystick[side].id = id;
          break;
        }
      }
    }
  }
}

function handleTouchMove(e) {
  if (gameState !== 'playing') return;
  e.preventDefault();

  for (let t of e.changedTouches) {
    const pos = getTouchPos(t);
    const sides = gameMode === '1p' ? [playerTeamSide] : ['left', 'right'];
    for (let side of sides) {
      if (joystick[side].active && joystick[side].id === t.identifier) {
        joystick[side].currX = pos.x;
        joystick[side].currY = pos.y;
      }
    }
  }
}

function handleTouchEnd(e) {
  if (gameState !== 'playing') return;
  e.preventDefault();
  for (let t of e.changedTouches) {
    const sides = gameMode === '1p' ? [playerTeamSide] : ['left', 'right'];
    for (let side of sides) {
      if (joystick[side].id === t.identifier) {
        joystick[side].active = false;
        joystick[side].id = null;
      }
      if (shootBtn[side].id === t.identifier) {
        shootBtn[side].pressed = false;
        shootBtn[side].id = null;
      }
    }
  }
}

// ===== KEYBOARD SUPPORT =====
let keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

function performShoot(side) {
  const now = Date.now();
  if (now - lastKickTime[side] < KICK_COOLDOWN) return;

  const player = selectedPlayer[side];
  if (!player) return;

  const dx = ball.x - player.x;
  const dy = ball.y - player.y;
  const dist = Math.hypot(dx, dy);

  if (dist < SHOOT_RANGE) {
    lastKickTime[side] = now;
    const angle = Math.atan2(dy, dx);
    ball.vx = Math.cos(angle) * SHOOT_POWER;
    ball.vy = Math.sin(angle) * SHOOT_POWER;
    player.x -= Math.cos(angle) * 3;
    player.y -= Math.sin(angle) * 3;
  }
}

// ===== COMPUTER AI =====
function updateCPU() {
  if (gameMode !== '1p') return;

  const cpuPlayer = selectedPlayer[cpuTeamSide];
  if (!cpuPlayer) return;

  const now = Date.now();
  const diff = getDiff();

  // Hesitation: on easy/medium, CPU sometimes just stops for a moment
  if (now < cpuAI.pauseUntil) return;

  // Random hesitation
  if (Math.random() < diff.missChance * 0.02) {
    cpuAI.pauseUntil = now + 300 + Math.random() * 500;
    return;
  }

  // Determine CPU goal and opponent goal
  const cpuGoalX = cpuTeamSide === 'left' ? FIELD_X : FIELD_X + FIELD_W;
  const oppGoalX = cpuTeamSide === 'left' ? FIELD_X + FIELD_W : FIELD_X;
  const oppGoalY = FIELD_Y + FIELD_H / 2;

  const distToBall = Math.hypot(ball.x - cpuPlayer.x, ball.y - cpuPlayer.y);
  const ballDistToOwnGoal = Math.hypot(ball.x - cpuGoalX, ball.y - oppGoalY);
  const ballDistToOppGoal = Math.hypot(ball.x - oppGoalX, ball.y - oppGoalY);

  // Strategy decision (slower on easier difficulties)
  if (now - cpuAI.thinkTimer > diff.reactionDelay) {
    cpuAI.thinkTimer = now;

    if (ballDistToOwnGoal < FIELD_W * 0.35) {
      cpuAI.strategy = 'defend';
    } else if (distToBall < diff.chaseRadius) {
      cpuAI.strategy = 'attack';
    } else {
      cpuAI.strategy = 'chase';
    }
  }

  // CPU movement speed based on difficulty
  let speed = PLAYER_SPEED * diff.moveSpeed;
  let targetX = ball.x;
  let targetY = ball.y;

  switch (cpuAI.strategy) {
    case 'chase':
      targetX = ball.x;
      targetY = ball.y;
      break;

    case 'attack': {
      const behindX = cpuTeamSide === 'left'
        ? ball.x - 20
        : ball.x + 20;
      if ((cpuTeamSide === 'left' && cpuPlayer.x < ball.x - 10) ||
          (cpuTeamSide === 'right' && cpuPlayer.x > ball.x + 10)) {
        targetX = ball.x;
        targetY = ball.y;
        speed = PLAYER_SPEED * diff.moveSpeed * 1.1;
      } else {
        targetX = behindX;
        targetY = ball.y + (Math.random() - 0.5) * 30;
      }
      break;
    }

    case 'defend':
      targetX = ball.x;
      targetY = ball.y;
      speed = PLAYER_SPEED * diff.moveSpeed * 1.1;
      break;
  }

  // Move toward target
  const dx = targetX - cpuPlayer.x;
  const dy = targetY - cpuPlayer.y;
  const dist = Math.hypot(dx, dy);

  if (dist > 5) {
    cpuPlayer.x += (dx / dist) * speed;
    cpuPlayer.y += (dy / dist) * speed;
  }

  // Clamp to field
  cpuPlayer.x = Math.max(FIELD_X + PLAYER_RADIUS, Math.min(FIELD_X + FIELD_W - PLAYER_RADIUS, cpuPlayer.x));
  cpuPlayer.y = Math.max(FIELD_Y + PLAYER_RADIUS, Math.min(FIELD_Y + FIELD_H - PLAYER_RADIUS, cpuPlayer.y));

  // CPU shooting (with difficulty-based cooldown and accuracy)
  const distBall = Math.hypot(ball.x - cpuPlayer.x, ball.y - cpuPlayer.y);
  if (distBall < SHOOT_RANGE && now - cpuAI.lastKickTime > diff.shootCooldown) {

    // Random miss chance: CPU just doesn't shoot sometimes
    if (Math.random() < diff.missChance) {
      cpuAI.lastKickTime = now - diff.shootCooldown * 0.5; // partial reset
      return;
    }

    const angleToGoal = Math.atan2(oppGoalY - cpuPlayer.y, oppGoalX - cpuPlayer.x);
    const angleToBall = Math.atan2(ball.y - cpuPlayer.y, ball.x - cpuPlayer.x);
    const angleDiff = Math.abs(angleToGoal - angleToBall);

    if (angleDiff < 1.2 || cpuAI.strategy === 'defend' || ballDistToOppGoal < FIELD_W * 0.4) {
      cpuAI.lastKickTime = now;
      lastKickTime[cpuTeamSide] = now;

      let kickAngle;
      if (cpuAI.strategy === 'defend') {
        kickAngle = Math.atan2(ball.y - cpuGoalX < 0 ? -1 : 1, oppGoalX - cpuGoalX);
        kickAngle += (Math.random() - 0.5) * diff.shootAccuracy;
      } else {
        const goalY = oppGoalY + (Math.random() - 0.5) * GOAL_H * 0.6;
        kickAngle = Math.atan2(goalY - cpuPlayer.y, oppGoalX - cpuPlayer.x);
        kickAngle += (Math.random() - 0.5) * diff.shootAccuracy;
      }

      const power = SHOOT_POWER * diff.shootPower;
      ball.vx = Math.cos(kickAngle) * power * (0.7 + Math.random() * 0.3);
      ball.vy = Math.sin(kickAngle) * power * (0.5 + Math.random() * 0.5);
      cpuPlayer.x -= Math.cos(kickAngle) * 3;
      cpuPlayer.y -= Math.sin(kickAngle) * 3;
    }
  }
}

// ===== GAME LOGIC =====
function update() {
  if (gameState !== 'playing') return;

  // --- Move human-controlled players ---
  const humanSides = gameMode === '1p' ? [playerTeamSide] : ['left', 'right'];

  for (let side of humanSides) {
    const p = selectedPlayer[side];
    if (!p) continue;

    let dx = 0, dy = 0;

    if (joystick[side].active) {
      dx = joystick[side].currX - joystick[side].startX;
      dy = joystick[side].currY - joystick[side].startY;
      const mag = Math.hypot(dx, dy);
      const maxDist = 50 * SCALE;
      if (mag > maxDist) {
        dx = (dx / mag) * maxDist;
        dy = (dy / mag) * maxDist;
        joystick[side].startX = joystick[side].currX - dx;
        joystick[side].startY = joystick[side].currY - dy;
      }
      dx = (dx / maxDist) * PLAYER_SPEED;
      dy = (dy / maxDist) * PLAYER_SPEED;
    }

    // Keyboard fallback
    if (side === 'left' || (gameMode === '1p' && playerTeamSide === 'left')) {
      if (keys['w'] || keys['W']) dy -= PLAYER_SPEED;
      if (keys['s'] || keys['S']) dy += PLAYER_SPEED;
      if (keys['a'] || keys['A']) dx -= PLAYER_SPEED;
      if (keys['d'] || keys['D']) dx += PLAYER_SPEED;
      if (keys[' ']) performShoot(side);
    }
    if (side === 'right' || (gameMode === '1p' && playerTeamSide === 'right')) {
      if (gameMode === '2p' || playerTeamSide === 'right') {
        if (keys['ArrowUp']) dy -= PLAYER_SPEED;
        if (keys['ArrowDown']) dy += PLAYER_SPEED;
        if (keys['ArrowLeft']) dx -= PLAYER_SPEED;
        if (keys['ArrowRight']) dx += PLAYER_SPEED;
        if (keys['Enter']) performShoot(side);
      }
    }
    // In 1P mode, also allow arrow keys
    if (gameMode === '1p') {
      if (keys['ArrowUp']) dy -= PLAYER_SPEED;
      if (keys['ArrowDown']) dy += PLAYER_SPEED;
      if (keys['ArrowLeft']) dx -= PLAYER_SPEED;
      if (keys['ArrowRight']) dx += PLAYER_SPEED;
      if (keys['Enter'] || keys[' ']) performShoot(playerTeamSide);
    }

    p.x += dx;
    p.y += dy;
    p.x = Math.max(FIELD_X + PLAYER_RADIUS, Math.min(FIELD_X + FIELD_W - PLAYER_RADIUS, p.x));
    p.y = Math.max(FIELD_Y + PLAYER_RADIUS, Math.min(FIELD_Y + FIELD_H - PLAYER_RADIUS, p.y));
  }

  // --- CPU AI for selected player ---
  updateCPU();

  // --- AI for non-selected players (teammates) ---
  players.forEach(p => {
    if (p === selectedPlayer.left || p === selectedPlayer.right) return;

    const toBallX = ball.x - p.x;
    const toBallY = ball.y - p.y;
    const toBallDist = Math.hypot(toBallX, toBallY);

    const toHomeX = p.homeX - p.x;
    const toHomeY = p.homeY - p.y;
    const toHomeDist = Math.hypot(toHomeX, toHomeY);

    let moveX = 0, moveY = 0;

    // CPU team uses difficulty-based GK and teammate speed
    const isCpuTeammate = gameMode === '1p' && p.team === cpuTeamSide;
    const diff = getDiff();
    const gkTrack = isCpuTeammate ? diff.gkSpeed : 0.08;

    if (p.isGK) {
      const targetY = Math.max(
        FIELD_Y + FIELD_H / 2 - GOAL_H / 2 + PLAYER_RADIUS,
        Math.min(FIELD_Y + FIELD_H / 2 + GOAL_H / 2 - PLAYER_RADIUS, ball.y)
      );
      moveY = (targetY - p.y) * gkTrack;
      moveX = (p.homeX - p.x) * 0.1;
    } else {
      const ballWeight = Math.max(0, 1 - toBallDist / 250) * (isCpuTeammate ? diff.moveSpeed * 0.7 : 0.6);
      const homeWeight = 0.04;

      if (toBallDist > 0) {
        moveX += (toBallX / toBallDist) * PLAYER_SPEED * 0.6 * ballWeight;
        moveY += (toBallY / toBallDist) * PLAYER_SPEED * 0.6 * ballWeight;
      }
      if (toHomeDist > 20) {
        moveX += (toHomeX / toHomeDist) * PLAYER_SPEED * homeWeight;
        moveY += (toHomeY / toHomeDist) * PLAYER_SPEED * homeWeight;
      }

      const speed = Math.hypot(moveX, moveY);
      if (speed > PLAYER_SPEED * 0.5) {
        moveX = (moveX / speed) * PLAYER_SPEED * 0.5;
        moveY = (moveY / speed) * PLAYER_SPEED * 0.5;
      }
    }

    p.x += moveX;
    p.y += moveY;
    p.x = Math.max(FIELD_X + PLAYER_RADIUS, Math.min(FIELD_X + FIELD_W - PLAYER_RADIUS, p.x));
    p.y = Math.max(FIELD_Y + PLAYER_RADIUS, Math.min(FIELD_Y + FIELD_H - PLAYER_RADIUS, p.y));

    // Teammate auto-kick when close to ball
    if (toBallDist < PLAYER_RADIUS + BALL_RADIUS + 5) {
      const targetGoalX = p.team === 'left' ? FIELD_X + FIELD_W : FIELD_X;
      const targetGoalY = FIELD_Y + FIELD_H / 2;
      const kickAngle = Math.atan2(targetGoalY - p.y, targetGoalX - p.x);
      const kickStr = isCpuTeammate ? diff.teammateKick : 3;
      ball.vx += Math.cos(kickAngle) * kickStr;
      ball.vy += Math.sin(kickAngle) * (kickStr * 0.66);
    }
  });

  // --- Ball physics ---
  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.vx *= BALL_FRICTION;
  ball.vy *= BALL_FRICTION;

  // Ball-player collision
  players.forEach(p => {
    const dx = ball.x - p.x;
    const dy = ball.y - p.y;
    const dist = Math.hypot(dx, dy);
    const minDist = PLAYER_RADIUS + BALL_RADIUS;

    if (dist < minDist && dist > 0) {
      const overlap = minDist - dist;
      const nx = dx / dist;
      const ny = dy / dist;
      ball.x += nx * overlap;
      ball.y += ny * overlap;

      const dot = ball.vx * nx + ball.vy * ny;
      ball.vx -= dot * nx;
      ball.vy -= dot * ny;
      ball.vx += nx * 2;
      ball.vy += ny * 2;
    }
  });

  // Player-player collision
  for (let i = 0; i < players.length; i++) {
    for (let j = i + 1; j < players.length; j++) {
      const a = players[i], b = players[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      const minDist = PLAYER_RADIUS * 2;
      if (dist < minDist && dist > 0) {
        const overlap = (minDist - dist) / 2;
        const nx = dx / dist;
        const ny = dy / dist;
        a.x -= nx * overlap;
        a.y -= ny * overlap;
        b.x += nx * overlap;
        b.y += ny * overlap;
      }
    }
  }

  // Goal detection
  const goalTop = FIELD_Y + FIELD_H / 2 - GOAL_H / 2;
  const goalBottom = FIELD_Y + FIELD_H / 2 + GOAL_H / 2;

  // Left goal (Fortuna scores)
  if (ball.x - BALL_RADIUS <= FIELD_X && ball.y >= goalTop && ball.y <= goalBottom) {
    score.right++;
    showGoal(FORTUNA.name);
    return;
  }
  // Right goal (Schalke scores)
  if (ball.x + BALL_RADIUS >= FIELD_X + FIELD_W && ball.y >= goalTop && ball.y <= goalBottom) {
    score.left++;
    showGoal(SCHALKE.name);
    return;
  }

  // Wall bouncing
  if (ball.x - BALL_RADIUS < FIELD_X) {
    ball.x = FIELD_X + BALL_RADIUS;
    ball.vx = Math.abs(ball.vx) * BOUNCE_FACTOR;
  }
  if (ball.x + BALL_RADIUS > FIELD_X + FIELD_W) {
    ball.x = FIELD_X + FIELD_W - BALL_RADIUS;
    ball.vx = -Math.abs(ball.vx) * BOUNCE_FACTOR;
  }
  if (ball.y - BALL_RADIUS < FIELD_Y) {
    ball.y = FIELD_Y + BALL_RADIUS;
    ball.vy = Math.abs(ball.vy) * BOUNCE_FACTOR;
  }
  if (ball.y + BALL_RADIUS > FIELD_Y + FIELD_H) {
    ball.y = FIELD_Y + FIELD_H - BALL_RADIUS;
    ball.vy = -Math.abs(ball.vy) * BOUNCE_FACTOR;
  }

  updateSelectedPlayers();
  updateLinesmen();

  if (Math.abs(ball.vx) < 0.05) ball.vx = 0;
  if (Math.abs(ball.vy) < 0.05) ball.vy = 0;
}

function showGoal(teamName) {
  gameState = 'goal';
  document.getElementById('scorerText').textContent = teamName + '!';
  document.getElementById('goalOverlay').style.display = 'flex';

  // Launch fireworks!
  fireworks = [];
  createFireworks();
  // Launch additional waves of fireworks
  setTimeout(() => createFireworks(), 400);
  setTimeout(() => createFireworks(), 900);
  setTimeout(() => createFireworks(), 1400);

  setTimeout(() => {
    document.getElementById('goalOverlay').style.display = 'none';
    fireworks = [];
    if (score.left >= WINNING_SCORE || score.right >= WINNING_SCORE) {
      showWin();
    } else {
      resetPositions();
      gameState = 'playing';
    }
  }, 2500);
}

function showWin() {
  gameState = 'finished';
  setCanvasInteractive(false);
  const winner = score.left >= WINNING_SCORE ? SCHALKE.name : FORTUNA.name;
  document.getElementById('winnerText').textContent = '\uD83C\uDFC6 ' + winner + ' gewinnt! \uD83C\uDFC6';
  document.getElementById('finalScore').textContent = score.left + ' : ' + score.right;
  document.getElementById('winScreen').style.display = 'flex';
}

function showMenu() {
  gameState = 'menu';
  setCanvasInteractive(false);
  document.getElementById('winScreen').style.display = 'none';
  document.getElementById('teamSelectScreen').style.display = 'none';
  document.getElementById('difficultyScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
}

function setCanvasInteractive(active) {
  canvas.style.display = active ? 'block' : 'none';
  canvas.style.pointerEvents = active ? 'auto' : 'none';
  if (active) {
    // Re-apply DPR transform after showing canvas
    resizeCanvas();
  }
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('teamSelectScreen').style.display = 'none';
  document.getElementById('difficultyScreen').style.display = 'none';
  score = { left: 0, right: 0 };
  fireworks = [];
  cpuAI.pauseUntil = 0;
  cpuAI.lastKickTime = 0;
  cpuAI.thinkTimer = 0;
  resetPositions();
  gameState = 'playing';
  setCanvasInteractive(true);
}

// ===== DRAWING =====
function draw() {
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  drawField();
  drawCornerFlags();
  drawLinesmen();
  drawPlayers();
  drawBall();
  // Fireworks on top of everything
  if (fireworks.length > 0) {
    updateFireworks();
    drawFireworks();
  }
  drawUI();
  drawControls();
}

function drawField() {
  const bp = Math.round(20 * SCALE);
  const borderR = Math.round(12 * SCALE);
  const outerX = FIELD_X - bp;
  const outerY = FIELD_Y - bp;
  const outerW = FIELD_W + bp * 2;
  const outerH = FIELD_H + bp * 2;

  // --- Teal/cyan rounded border (Football Manager style) ---
  ctx.fillStyle = '#3aafa9';
  ctx.beginPath();
  ctx.moveTo(outerX + borderR, outerY);
  ctx.lineTo(outerX + outerW - borderR, outerY);
  ctx.arcTo(outerX + outerW, outerY, outerX + outerW, outerY + borderR, borderR);
  ctx.lineTo(outerX + outerW, outerY + outerH - borderR);
  ctx.arcTo(outerX + outerW, outerY + outerH, outerX + outerW - borderR, outerY + outerH, borderR);
  ctx.lineTo(outerX + borderR, outerY + outerH);
  ctx.arcTo(outerX, outerY + outerH, outerX, outerY + outerH - borderR, borderR);
  ctx.lineTo(outerX, outerY + borderR);
  ctx.arcTo(outerX, outerY, outerX + borderR, outerY, borderR);
  ctx.closePath();
  ctx.fill();

  // --- Grass with gradient ---
  const grassGrad = ctx.createLinearGradient(FIELD_X, FIELD_Y, FIELD_X, FIELD_Y + FIELD_H);
  grassGrad.addColorStop(0, '#328a3e');
  grassGrad.addColorStop(0.5, '#2d7a36');
  grassGrad.addColorStop(1, '#328a3e');
  ctx.fillStyle = grassGrad;
  ctx.fillRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);

  // Mowing stripes
  const stripeW = FIELD_W / 16;
  for (let i = 0; i < 16; i++) {
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.04)';
    ctx.fillRect(FIELD_X + i * stripeW, FIELD_Y, stripeW, FIELD_H);
  }

  // Subtle vignette on grass edges
  const vignGrad = ctx.createRadialGradient(
    FIELD_X + FIELD_W / 2, FIELD_Y + FIELD_H / 2, Math.min(FIELD_W, FIELD_H) * 0.3,
    FIELD_X + FIELD_W / 2, FIELD_Y + FIELD_H / 2, Math.max(FIELD_W, FIELD_H) * 0.6
  );
  vignGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vignGrad.addColorStop(1, 'rgba(0,0,0,0.12)');
  ctx.fillStyle = vignGrad;
  ctx.fillRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);

  const lineColor = 'rgba(255,255,255,0.85)';
  const lw = 2 * SCALE;
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = lw;
  ctx.fillStyle = lineColor;

  // --- Field boundary ---
  ctx.strokeRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);

  // --- Halfway line ---
  ctx.beginPath();
  ctx.moveTo(FIELD_X + FIELD_W / 2, FIELD_Y);
  ctx.lineTo(FIELD_X + FIELD_W / 2, FIELD_Y + FIELD_H);
  ctx.stroke();

  // --- Center circle + spot ---
  ctx.beginPath();
  ctx.arc(FIELD_X + FIELD_W / 2, FIELD_Y + FIELD_H / 2, CENTER_RADIUS, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(FIELD_X + FIELD_W / 2, FIELD_Y + FIELD_H / 2, 3 * SCALE, 0, Math.PI * 2);
  ctx.fill();

  // --- Penalty areas ---
  const penW = FIELD_W * 0.18;
  const penH = GOAL_H * 1.8;
  ctx.strokeRect(FIELD_X, FIELD_Y + FIELD_H / 2 - penH / 2, penW, penH);
  ctx.strokeRect(FIELD_X + FIELD_W - penW, FIELD_Y + FIELD_H / 2 - penH / 2, penW, penH);

  // --- Goal areas (6-yard box) ---
  const goalAreaW = FIELD_W * 0.065;
  const goalAreaH = GOAL_H * 1.05;
  ctx.strokeRect(FIELD_X, FIELD_Y + FIELD_H / 2 - goalAreaH / 2, goalAreaW, goalAreaH);
  ctx.strokeRect(FIELD_X + FIELD_W - goalAreaW, FIELD_Y + FIELD_H / 2 - goalAreaH / 2, goalAreaW, goalAreaH);

  // --- Penalty spots ---
  const penSpotX = FIELD_W * 0.12;
  ctx.beginPath();
  ctx.arc(FIELD_X + penSpotX, FIELD_Y + FIELD_H / 2, 2.5 * SCALE, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(FIELD_X + FIELD_W - penSpotX, FIELD_Y + FIELD_H / 2, 2.5 * SCALE, 0, Math.PI * 2);
  ctx.fill();

  // --- Penalty arcs ---
  const penArcR = CENTER_RADIUS * 0.85;
  const ratioL = (penW - penSpotX) / penArcR;
  if (Math.abs(ratioL) <= 1) {
    const arcA = Math.acos(ratioL);
    ctx.beginPath();
    ctx.arc(FIELD_X + penSpotX, FIELD_Y + FIELD_H / 2, penArcR, -arcA, arcA);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(FIELD_X + FIELD_W - penSpotX, FIELD_Y + FIELD_H / 2, penArcR, Math.PI - arcA, Math.PI + arcA);
    ctx.stroke();
  }

  // --- Corner arcs ---
  const cornerR = Math.min(FIELD_W, FIELD_H) * 0.025;
  ctx.beginPath(); ctx.arc(FIELD_X, FIELD_Y, cornerR, 0, Math.PI / 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(FIELD_X + FIELD_W, FIELD_Y, cornerR, Math.PI / 2, Math.PI); ctx.stroke();
  ctx.beginPath(); ctx.arc(FIELD_X, FIELD_Y + FIELD_H, cornerR, -Math.PI / 2, 0); ctx.stroke();
  ctx.beginPath(); ctx.arc(FIELD_X + FIELD_W, FIELD_Y + FIELD_H, cornerR, Math.PI, Math.PI * 1.5); ctx.stroke();

  // --- Goals with net ---
  const goalTop = FIELD_Y + FIELD_H / 2 - GOAL_H / 2;
  ctx.lineWidth = 3 * SCALE;
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = 'rgba(200,200,200,0.15)';

  ctx.fillRect(FIELD_X - GOAL_DEPTH, goalTop, GOAL_DEPTH, GOAL_H);
  ctx.strokeRect(FIELD_X - GOAL_DEPTH, goalTop, GOAL_DEPTH, GOAL_H);
  ctx.fillRect(FIELD_X + FIELD_W, goalTop, GOAL_DEPTH, GOAL_H);
  ctx.strokeRect(FIELD_X + FIELD_W, goalTop, GOAL_DEPTH, GOAL_H);

  // Net grid
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 0.5 * SCALE;
  const ns = Math.max(5, Math.round(6 * SCALE));
  for (let g = 0; g < 2; g++) {
    const gx = g === 0 ? FIELD_X - GOAL_DEPTH : FIELD_X + FIELD_W;
    for (let i = 0; i <= GOAL_H; i += ns) {
      ctx.beginPath(); ctx.moveTo(gx, goalTop + i); ctx.lineTo(gx + GOAL_DEPTH, goalTop + i); ctx.stroke();
    }
    for (let i = 0; i <= GOAL_DEPTH; i += ns) {
      ctx.beginPath(); ctx.moveTo(gx + i, goalTop); ctx.lineTo(gx + i, goalTop + GOAL_H); ctx.stroke();
    }
  }
}

function drawCornerFlags() {
  const flagH = Math.round(14 * SCALE);
  const flagW = Math.round(8 * SCALE);
  const poleW = 1.5 * SCALE;
  const corners = [
    [FIELD_X, FIELD_Y],
    [FIELD_X + FIELD_W, FIELD_Y],
    [FIELD_X, FIELD_Y + FIELD_H],
    [FIELD_X + FIELD_W, FIELD_Y + FIELD_H]
  ];
  corners.forEach(([cx, cy]) => {
    // Pole
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = poleW;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx, cy - flagH);
    ctx.stroke();
    // Flag triangle (yellow)
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(cx, cy - flagH);
    ctx.lineTo(cx + flagW, cy - flagH + flagW * 0.5);
    ctx.lineTo(cx, cy - flagH + flagW);
    ctx.closePath();
    ctx.fill();
    // Flag outline
    ctx.strokeStyle = '#cc9900';
    ctx.lineWidth = 0.5 * SCALE;
    ctx.stroke();
  });
}

function drawLinesmen() {
  if (gameState !== 'playing' && gameState !== 'goal') return;
  const s = SCALE;
  const bodyR = Math.round(7 * s);

  [linesmen.top, linesmen.bottom].forEach((lm, idx) => {
    const isTop = idx === 0;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(lm.x + 1, lm.y + 2, bodyR, bodyR * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body - black outfit
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(lm.x, lm.y, bodyR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 1.5 * s;
    ctx.stroke();

    // "L" label
    ctx.fillStyle = '#ffcc00';
    ctx.font = `bold ${Math.round(bodyR * 0.85)}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('L', lm.x, lm.y + 1);

    // Flag stick
    const flagDir = isTop ? -1 : 1;
    const stickLen = Math.round(12 * s);
    const flagTipX = lm.x + (lm.flagUp ? 0 : stickLen * 0.7);
    const flagTipY = lm.y + flagDir * (lm.flagUp ? stickLen : stickLen * 0.4);

    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1.5 * s;
    ctx.beginPath();
    ctx.moveTo(lm.x, lm.y);
    ctx.lineTo(flagTipX, flagTipY);
    ctx.stroke();

    // Small flag at tip
    const fSize = Math.round(5 * s);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(flagTipX, flagTipY - fSize / 2, fSize, fSize);
    ctx.strokeStyle = '#cc0000';
    ctx.lineWidth = 0.5 * s;
    ctx.strokeRect(flagTipX, flagTipY - fSize / 2, fSize, fSize);
  });
}

function drawPlayers() {
  players.forEach(p => {
    const isSelected = (p === selectedPlayer.left || p === selectedPlayer.right);
    const isCPU = gameMode === '1p' && p === selectedPlayer[cpuTeamSide];

    // Selection indicator
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, PLAYER_RADIUS + 6, 0, Math.PI * 2);
      ctx.strokeStyle = isCPU ? '#ff4444' : '#ffd700';
      ctx.lineWidth = 2.5;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);

      if (!isCPU) {
        const dx = ball.x - p.x;
        const dy = ball.y - p.y;
        const dist = Math.hypot(dx, dy);
        if (dist > PLAYER_RADIUS + BALL_RADIUS + 15) {
          const angle = Math.atan2(dy, dx);
          const arrowDist = PLAYER_RADIUS + 10;
          const ax = p.x + Math.cos(angle) * arrowDist;
          const ay = p.y + Math.sin(angle) * arrowDist;
          ctx.fillStyle = '#ffd700';
          ctx.beginPath();
          ctx.arc(ax, ay, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(p.x + 2, p.y + 3, PLAYER_RADIUS, PLAYER_RADIUS * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Player body
    const color = p.isGK ? p.teamData.gk : p.teamData.primary;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = p.teamData.secondary;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = p.teamData.secondary;
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_RADIUS * 0.35, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = p.isGK ? '#000' : p.teamData.secondary;
    ctx.font = `bold ${PLAYER_RADIUS * 0.7}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.teamData.short[0], p.x, p.y + 1);
  });
}

function drawBall() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(ball.x + 2, ball.y + 3, BALL_RADIUS, BALL_RADIUS * 0.7, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_RADIUS * 0.45, 0, Math.PI * 2);
  ctx.fill();

  const speed = Math.hypot(ball.vx, ball.vy);
  if (speed > 3) {
    const alpha = Math.min(0.4, speed / 20);
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ball.x, ball.y);
    ctx.lineTo(ball.x - ball.vx * 3, ball.y - ball.vy * 3);
    ctx.stroke();
  }
}

function drawUI() {
  const barH = Math.round(44 * SCALE);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, barH);

  ctx.fillStyle = SCHALKE.primary;
  ctx.fillRect(0, 0, W / 2 - 30 * SCALE, barH);
  ctx.fillStyle = FORTUNA.primary;
  ctx.fillRect(W / 2 + 30 * SCALE, 0, W / 2 - 30 * SCALE, barH);

  ctx.fillStyle = '#fff';

  ctx.font = `bold ${Math.round(13 * SCALE)}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  let leftLabel = SCHALKE.short;
  let rightLabel = FORTUNA.short;
  if (gameMode === '1p') {
    const diffLabels = { easy: 'LEICHT', medium: 'MITTEL', hard: 'SCHWER' };
    const cpuLabel = 'CPU ' + diffLabels[difficulty];
    if (playerTeamSide === 'left') {
      leftLabel = SCHALKE.short + ' (DU)';
      rightLabel = FORTUNA.short + ' (' + cpuLabel + ')';
    } else {
      leftLabel = SCHALKE.short + ' (' + cpuLabel + ')';
      rightLabel = FORTUNA.short + ' (DU)';
    }
  }

  ctx.fillText(leftLabel, W * 0.15, barH / 2 - 10 * SCALE);
  ctx.fillText(rightLabel, W * 0.85, barH / 2 - 10 * SCALE);

  ctx.font = `bold ${Math.round(20 * SCALE)}px Arial`;
  ctx.fillText(String(score.left), W * 0.15, barH / 2 + 10 * SCALE);
  ctx.fillText(String(score.right), W * 0.85, barH / 2 + 10 * SCALE);

  ctx.fillStyle = '#ffd700';
  ctx.font = `bold ${Math.round(24 * SCALE)}px Arial`;
  ctx.fillText(score.left + ' : ' + score.right, W / 2, barH / 2);
}

function drawControls() {
  if (gameState !== 'playing') return;

  const joyR = Math.round(45 * SCALE);
  const thumbR = Math.round(20 * SCALE);
  const fontSize = Math.round(13 * SCALE);
  const hintSize = Math.round(10 * SCALE);

  function drawJoystick(side) {
    if (!joystick[side].active) return;
    ctx.beginPath();
    ctx.arc(joystick[side].startX, joystick[side].startY, joyR, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    const dx = joystick[side].currX - joystick[side].startX;
    const dy = joystick[side].currY - joystick[side].startY;
    const dist = Math.min(Math.hypot(dx, dy), joyR);
    const angle = Math.atan2(dy, dx);
    const thumbX = joystick[side].startX + Math.cos(angle) * dist;
    const thumbY = joystick[side].startY + Math.sin(angle) * dist;

    ctx.beginPath();
    ctx.arc(thumbX, thumbY, thumbR, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();
  }

  function drawShootBtn(side) {
    const btn = getShootBtnPos(side);
    const color = side === 'left' ? SCHALKE.primary : FORTUNA.primary;
    const pressed = shootBtn[side].pressed;

    ctx.beginPath();
    ctx.arc(btn.x, btn.y, btn.r, 0, Math.PI * 2);
    ctx.fillStyle = pressed ? '#ffd700' : color;
    ctx.globalAlpha = pressed ? 0.9 : 0.7;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2 * SCALE;
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fontSize}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SCHUSS', btn.x, btn.y);
  }

  if (gameMode === '1p') {
    const side = playerTeamSide;
    drawJoystick(side);
    drawShootBtn(side);

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = `${hintSize}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('Joystick: links tippen & ziehen', W * 0.3, H - 8 * SCALE);
  } else {
    for (let side of ['left', 'right']) {
      drawJoystick(side);
      drawShootBtn(side);
    }

    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    const lz = getJoystickZone('left');
    ctx.fillRect(lz.x, lz.y, lz.w, lz.h);
    const rz = getJoystickZone('right');
    ctx.fillRect(rz.x, rz.y, rz.w, rz.h);

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = `${hintSize}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('\u2190 ' + SCHALKE.short + ' Joystick', W * 0.15, H - 8 * SCALE);
    ctx.fillText(FORTUNA.short + ' Joystick \u2192', W * 0.85, H - 8 * SCALE);
  }
}

// ===== GAME LOOP =====
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ===== EVENT LISTENERS =====

// Mode: vs Computer -> go to difficulty selection first
document.getElementById('btnVsComputer').addEventListener('click', () => {
  gameMode = '1p';
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('difficultyScreen').style.display = 'flex';
  gameState = 'difficulty';
});

// Difficulty buttons -> then team selection
document.getElementById('diffEasy').addEventListener('click', () => {
  difficulty = 'easy';
  document.getElementById('difficultyScreen').style.display = 'none';
  document.getElementById('teamSelectScreen').style.display = 'flex';
  gameState = 'teamselect';
});
document.getElementById('diffMedium').addEventListener('click', () => {
  difficulty = 'medium';
  document.getElementById('difficultyScreen').style.display = 'none';
  document.getElementById('teamSelectScreen').style.display = 'flex';
  gameState = 'teamselect';
});
document.getElementById('diffHard').addEventListener('click', () => {
  difficulty = 'hard';
  document.getElementById('difficultyScreen').style.display = 'none';
  document.getElementById('teamSelectScreen').style.display = 'flex';
  gameState = 'teamselect';
});

// Mode: 2 Player
document.getElementById('btn2Player').addEventListener('click', () => {
  gameMode = '2p';
  playerTeamSide = 'left';
  cpuTeamSide = 'right';
  startGame();
});

// Team selection
document.getElementById('selSchalke').addEventListener('click', () => {
  playerTeamSide = 'left';
  cpuTeamSide = 'right';
  startGame();
});
document.getElementById('selFortuna').addEventListener('click', () => {
  playerTeamSide = 'right';
  cpuTeamSide = 'left';
  startGame();
});

// Restart
document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('winScreen').style.display = 'none';
  score = { left: 0, right: 0 };
  resetPositions();
  gameState = 'playing';
  setCanvasInteractive(true);
});

// Back to menu
document.getElementById('menuBtn').addEventListener('click', () => {
  showMenu();
});

// Set initial instructions
document.getElementById('instructionsText').innerHTML =
  'W\u00e4hle deinen Spielmodus!<br>' +
  'Gegen Computer: Alleine gegen die KI.<br>' +
  '2 Spieler: Zu zweit auf einem Ger\u00e4t.<br>' +
  'Erstes Team mit 5 Toren gewinnt!';

// Init
setCanvasInteractive(false); // start with menu visible
resetPositions();
gameLoop();
</script>
