<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Abfahrt - Interaktives Spiel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
        }

        #gameCanvas {
            width: 100vw;
            height: 100vh;
        }

        /* HUD Overlay */
        #hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 10;
            pointer-events: none;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 8px 18px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .hud-item span {
            color: #7dd3fc;
        }

        /* Controls */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        .ctrl-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .ctrl-btn:active, .ctrl-btn.active {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0.95);
            border-color: rgba(255, 255, 255, 0.7);
        }

        #btnBoost {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.4), rgba(249, 115, 22, 0.4));
            border-color: rgba(249, 115, 22, 0.6);
            font-size: 32px;
        }

        #btnBoost:active, #btnBoost.active {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.7), rgba(249, 115, 22, 0.7));
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.5);
        }

        .ctrl-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            text-align: center;
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .ctrl-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Keyboard hints */
        #keyboard-hints {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        kbd {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 2px 6px;
            font-family: inherit;
            font-size: 11px;
        }

        /* Crash overlay */
        #crash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
        }

        #crash-overlay.visible {
            display: flex;
        }

        #crash-overlay h2 {
            color: white;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        #crash-overlay p {
            color: rgba(255,255,255,0.8);
            font-size: 20px;
            margin-bottom: 30px;
        }

        #crash-overlay button {
            padding: 14px 40px;
            font-size: 18px;
            border: 2px solid white;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }

        #crash-overlay button:hover {
            background: rgba(255,255,255,0.35);
        }

        /* Speed lines effect */
        #speed-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">
    <div class="hud-item">Tempo: <span id="speedDisplay">0</span> km/h</div>
    <div class="hud-item">Distanz: <span id="distanceDisplay">0</span> m</div>
    <div class="hud-item">Score: <span id="scoreDisplay">0</span></div>
</div>

<div id="keyboard-hints">
    <kbd>&larr;</kbd> / <kbd>&rarr;</kbd> Lenken &nbsp;&nbsp; <kbd>Leertaste</kbd> / <kbd>&uarr;</kbd> Turbo
</div>

<div id="controls">
    <div class="ctrl-group">
        <button class="ctrl-btn" id="btnLeft" aria-label="Links fahren">&#9664;</button>
        <div class="ctrl-label">LINKS</div>
    </div>
    <div class="ctrl-group">
        <button class="ctrl-btn" id="btnBoost" aria-label="Schneller fahren">&#9650;</button>
        <div class="ctrl-label">TURBO</div>
    </div>
    <div class="ctrl-group">
        <button class="ctrl-btn" id="btnRight" aria-label="Rechts fahren">&#9654;</button>
        <div class="ctrl-label">RECHTS</div>
    </div>
</div>

<div id="crash-overlay">
    <h2>Crash!</h2>
    <p>Du bist gegen einen Baum gefahren!</p>
    <p id="crash-stats"></p>
    <button id="btnRestart">Nochmal fahren</button>
</div>

<script>
// ============================================
// GAME ENGINE
// ============================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============================================
// GAME STATE
// ============================================
const state = {
    skierX: 0,
    skierLean: 0,        // -1 left, 0 center, 1 right
    skierTargetLean: 0,
    speed: 40,
    maxSpeed: 120,
    boostSpeed: 180,
    distance: 0,
    score: 0,
    boosting: false,
    turning: 0,          // -1 left, 0 none, 1 right
    crashed: false,
    cameraY: 0,
    time: 0,
    snowParticles: [],
    sprayParticles: [],
    boostParticles: [],
    trees: [],
    rocks: [],
    flags: [],
    moguls: [],
    treeSpawnTimer: 0,
    windOffset: 0
};

// ============================================
// COLORS & THEME
// ============================================
const SKY_TOP = '#4a90d9';
const SKY_BOTTOM = '#87ceeb';
const MOUNTAIN_COLORS = ['#8B9EAB', '#7A8D99', '#6B7F8C', '#9BADB8'];
const SNOW_COLOR = '#f0f4f8';
const SNOW_SHADOW = '#d4dfe8';
const TREE_TRUNK = '#4a3728';
const TREE_GREENS = ['#1a5c2a', '#1e6b31', '#22793a', '#186324'];

// ============================================
// MOUNTAIN PANORAMA (background layers)
// ============================================
const mountainLayers = [];

function generateMountains() {
    mountainLayers.length = 0;
    for (let layer = 0; layer < 4; layer++) {
        const peaks = [];
        const numPeaks = 6 + layer * 2;
        for (let i = 0; i <= numPeaks; i++) {
            peaks.push({
                x: (i / numPeaks),
                y: 0.15 + layer * 0.06 + Math.random() * 0.08,
                snowLine: 0.03 + Math.random() * 0.04
            });
        }
        mountainLayers.push({ peaks, color: MOUNTAIN_COLORS[layer], depth: 0.1 + layer * 0.15 });
    }
}
generateMountains();

function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, H * 0.45);
    grad.addColorStop(0, SKY_TOP);
    grad.addColorStop(1, SKY_BOTTOM);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H * 0.45);

    // Sun
    const sunX = W * 0.8;
    const sunY = H * 0.1;
    const sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 60);
    sunGrad.addColorStop(0, 'rgba(255, 250, 200, 1)');
    sunGrad.addColorStop(0.3, 'rgba(255, 240, 150, 0.6)');
    sunGrad.addColorStop(1, 'rgba(255, 240, 150, 0)');
    ctx.fillStyle = sunGrad;
    ctx.fillRect(sunX - 80, sunY - 80, 160, 160);

    // Sun glow
    const glowGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 200);
    glowGrad.addColorStop(0, 'rgba(255, 245, 180, 0.3)');
    glowGrad.addColorStop(1, 'rgba(255, 245, 180, 0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(sunX - 200, sunY - 200, 400, 400);
}

function drawMountains() {
    const parallax = state.skierX * 0.001;

    for (let l = 0; l < mountainLayers.length; l++) {
        const layer = mountainLayers[l];
        const baseY = H * (0.2 + l * 0.06);
        const offsetX = parallax * (l + 1) * 20;

        // Mountain body
        ctx.beginPath();
        ctx.moveTo(-10, H * 0.5);
        for (let i = 0; i < layer.peaks.length; i++) {
            const p = layer.peaks[i];
            const px = p.x * W * 1.3 - W * 0.15 + offsetX;
            const py = baseY - p.y * H;
            if (i === 0) {
                ctx.lineTo(px, py);
            } else {
                const prev = layer.peaks[i - 1];
                const prevX = prev.x * W * 1.3 - W * 0.15 + offsetX;
                const prevY = baseY - prev.y * H;
                const cpx = (prevX + px) / 2;
                ctx.quadraticCurveTo(cpx, Math.min(prevY, py) - 10, px, py);
            }
        }
        ctx.lineTo(W + 10, H * 0.5);
        ctx.closePath();
        ctx.fillStyle = layer.color;
        ctx.fill();

        // Snow caps
        ctx.beginPath();
        ctx.moveTo(-10, H * 0.5);
        for (let i = 0; i < layer.peaks.length; i++) {
            const p = layer.peaks[i];
            const px = p.x * W * 1.3 - W * 0.15 + offsetX;
            const py = baseY - p.y * H;
            const snowPy = py + p.snowLine * H;
            if (i === 0) {
                ctx.lineTo(px, py);
            } else {
                const prev = layer.peaks[i - 1];
                const prevX = prev.x * W * 1.3 - W * 0.15 + offsetX;
                const prevY = baseY - prev.y * H;
                const cpx = (prevX + px) / 2;
                ctx.quadraticCurveTo(cpx, Math.min(prevY, py) - 10, px, py);
            }
        }
        for (let i = layer.peaks.length - 1; i >= 0; i--) {
            const p = layer.peaks[i];
            const px = p.x * W * 1.3 - W * 0.15 + offsetX;
            const py = baseY - p.y * H + p.snowLine * H;
            if (i === layer.peaks.length - 1) {
                ctx.lineTo(px, py);
            } else {
                const next = layer.peaks[i + 1];
                const nextX = next.x * W * 1.3 - W * 0.15 + offsetX;
                const nextY = baseY - next.y * H + next.snowLine * H;
                const cpx = (nextX + px) / 2;
                ctx.quadraticCurveTo(cpx, Math.max(nextY, py) + 5, px, py);
            }
        }
        ctx.closePath();
        ctx.fillStyle = `rgba(255, 255, 255, ${0.7 - l * 0.1})`;
        ctx.fill();
    }
}

// Valley between mountains and slope
function drawValley() {
    const valleyY = H * 0.38;
    const grad = ctx.createLinearGradient(0, valleyY, 0, H * 0.55);
    grad.addColorStop(0, '#a8c4b8');
    grad.addColorStop(0.3, '#8fb89e');
    grad.addColorStop(1, SNOW_COLOR);
    ctx.fillStyle = grad;
    ctx.fillRect(0, valleyY, W, H * 0.2);

    // Small village dots in valley
    const villageX = W * 0.3 + state.skierX * -0.02;
    for (let i = 0; i < 8; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#c4a882' : '#b8a080';
        ctx.fillRect(villageX + i * 25 + Math.sin(i * 2) * 10, valleyY + 30 + Math.sin(i) * 5, 8, 6);
        // Small roofs
        ctx.fillStyle = '#8b4513';
        ctx.beginPath();
        ctx.moveTo(villageX + i * 25 + Math.sin(i * 2) * 10 - 2, valleyY + 30 + Math.sin(i) * 5);
        ctx.lineTo(villageX + i * 25 + Math.sin(i * 2) * 10 + 4, valleyY + 24 + Math.sin(i) * 5);
        ctx.lineTo(villageX + i * 25 + Math.sin(i * 2) * 10 + 10, valleyY + 30 + Math.sin(i) * 5);
        ctx.fill();
    }
}

// ============================================
// SLOPE RENDERING
// ============================================
function drawSlope() {
    const slopeTop = H * 0.45;
    // Main slope gradient
    const grad = ctx.createLinearGradient(0, slopeTop, 0, H);
    grad.addColorStop(0, '#e8eef4');
    grad.addColorStop(0.3, SNOW_COLOR);
    grad.addColorStop(0.7, '#eaf0f6');
    grad.addColorStop(1, '#dce6ee');
    ctx.fillStyle = grad;
    ctx.fillRect(0, slopeTop, W, H - slopeTop);

    // Slope texture - ski tracks
    const trackOffset = (state.distance * 2) % 80;
    ctx.strokeStyle = 'rgba(180, 195, 210, 0.25)';
    ctx.lineWidth = 1;
    for (let y = slopeTop; y < H; y += 40) {
        const yy = y + trackOffset;
        if (yy > H) continue;
        const perspective = (yy - slopeTop) / (H - slopeTop);
        const spread = perspective * W * 0.3;
        ctx.beginPath();
        ctx.moveTo(W / 2 - spread + Math.sin(yy * 0.05) * 20, yy);
        ctx.lineTo(W / 2 + spread + Math.sin(yy * 0.05 + 1) * 20, yy);
        ctx.stroke();
    }

    // Mogul shadows
    const mogulOffset = (state.distance * 3) % 120;
    ctx.fillStyle = 'rgba(170, 190, 210, 0.15)';
    for (let y = slopeTop + 20; y < H; y += 60) {
        const yy = y + mogulOffset;
        if (yy > H || yy < slopeTop) continue;
        const perspective = (yy - slopeTop) / (H - slopeTop);
        for (let x = 0; x < 6; x++) {
            const mx = W * 0.2 + x * W * 0.12 + Math.sin(yy * 0.1 + x) * 30 - state.skierX * perspective * 0.3;
            const size = 8 + perspective * 15;
            ctx.beginPath();
            ctx.ellipse(mx, yy, size, size * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Slope edge glow (piste markers)
    const leftEdge = W * 0.05;
    const rightEdge = W * 0.95;
    for (let y = slopeTop + 50; y < H; y += 100) {
        const yy = y + (state.distance * 4) % 100;
        if (yy > H) continue;
        const perspective = (yy - slopeTop) / (H - slopeTop);
        const shift = state.skierX * perspective * -0.5;

        // Left flag
        ctx.fillStyle = '#e63946';
        ctx.fillRect(leftEdge + shift + perspective * W * 0.1, yy, 3, 12 * perspective + 4);
        ctx.fillStyle = '#ff6b6b';
        ctx.beginPath();
        ctx.moveTo(leftEdge + shift + perspective * W * 0.1 + 3, yy);
        ctx.lineTo(leftEdge + shift + perspective * W * 0.1 + 12, yy + 4);
        ctx.lineTo(leftEdge + shift + perspective * W * 0.1 + 3, yy + 8);
        ctx.fill();

        // Right flag
        ctx.fillStyle = '#2196F3';
        ctx.fillRect(rightEdge + shift - perspective * W * 0.1, yy, 3, 12 * perspective + 4);
        ctx.fillStyle = '#64b5f6';
        ctx.beginPath();
        ctx.moveTo(rightEdge + shift - perspective * W * 0.1, yy);
        ctx.lineTo(rightEdge + shift - perspective * W * 0.1 - 10, yy + 4);
        ctx.lineTo(rightEdge + shift - perspective * W * 0.1, yy + 8);
        ctx.fill();
    }
}

// ============================================
// TREES
// ============================================
function spawnTree() {
    const side = Math.random() < 0.5 ? -1 : 1;
    const lateralDist = 250 + Math.random() * 400;
    state.trees.push({
        x: side * lateralDist + (Math.random() - 0.5) * 80,
        y: -200,
        size: 0.7 + Math.random() * 0.6,
        type: Math.floor(Math.random() * 3),
        snowAmount: 0.3 + Math.random() * 0.5,
        sway: Math.random() * Math.PI * 2
    });
}

function drawTree(tree, screenX, screenY, scale) {
    const s = scale * tree.size;
    if (s < 0.05) return;

    const sway = Math.sin(state.time * 2 + tree.sway) * 2 * s;
    const trunkH = 30 * s;
    const layerCount = 4;

    ctx.save();
    ctx.translate(screenX + sway, screenY);

    // Shadow
    ctx.fillStyle = 'rgba(100, 120, 140, 0.15)';
    ctx.beginPath();
    ctx.ellipse(5 * s, 2, 20 * s, 6 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Trunk
    ctx.fillStyle = TREE_TRUNK;
    ctx.fillRect(-3 * s, -trunkH, 6 * s, trunkH);

    // Foliage layers
    for (let i = 0; i < layerCount; i++) {
        const layerY = -trunkH - i * 18 * s;
        const layerW = (28 - i * 5) * s;
        const layerH = 22 * s;

        // Green layer
        ctx.fillStyle = TREE_GREENS[i % TREE_GREENS.length];
        ctx.beginPath();
        ctx.moveTo(0, layerY - layerH);
        ctx.lineTo(-layerW, layerY);
        ctx.lineTo(layerW, layerY);
        ctx.closePath();
        ctx.fill();

        // Snow on branches
        if (tree.snowAmount > 0.3) {
            ctx.fillStyle = `rgba(240, 248, 255, ${tree.snowAmount})`;
            ctx.beginPath();
            ctx.moveTo(-layerW * 0.6, layerY - layerH * 0.4);
            ctx.quadraticCurveTo(0, layerY - layerH * 0.7, layerW * 0.6, layerY - layerH * 0.4);
            ctx.quadraticCurveTo(0, layerY - layerH * 0.2, -layerW * 0.6, layerY - layerH * 0.4);
            ctx.fill();
        }
    }

    ctx.restore();
}

// ============================================
// SKIER CHARACTER
// ============================================
function drawSkier() {
    const skierScreenX = W / 2 + state.skierLean * 3;
    const skierScreenY = H * 0.65;
    const lean = state.skierLean;
    const speed01 = state.speed / state.boostSpeed;

    ctx.save();
    ctx.translate(skierScreenX, skierScreenY);

    // Dynamic crouch based on speed
    const crouch = speed01 * 8;
    const leanAngle = lean * 0.15;
    ctx.rotate(leanAngle);

    // Shadow
    ctx.fillStyle = 'rgba(80, 100, 120, 0.2)';
    ctx.beginPath();
    ctx.ellipse(lean * 2, 28 - crouch / 2, 22 + Math.abs(lean) * 0.1, 6, lean * 0.05, 0, Math.PI * 2);
    ctx.fill();

    // Skis
    const skiLength = 40;
    const skiWidth = 3;
    ctx.fillStyle = '#1a237e';
    // Left ski
    ctx.save();
    ctx.translate(-8 + lean * 1.5, 22 - crouch / 2);
    ctx.rotate(lean * 0.08);
    ctx.fillRect(-skiLength / 2, -skiWidth / 2, skiLength, skiWidth);
    // Ski tip curve
    ctx.beginPath();
    ctx.arc(-skiLength / 2, 0, skiWidth, -Math.PI / 2, Math.PI / 2, true);
    ctx.fill();
    ctx.restore();
    // Right ski
    ctx.save();
    ctx.translate(8 + lean * 1.5, 24 - crouch / 2);
    ctx.rotate(lean * 0.08);
    ctx.fillRect(-skiLength / 2, -skiWidth / 2, skiLength, skiWidth);
    ctx.beginPath();
    ctx.arc(-skiLength / 2, 0, skiWidth, -Math.PI / 2, Math.PI / 2, true);
    ctx.fill();
    ctx.restore();

    // Poles
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    const poleAngle = lean * 0.2;
    // Left pole
    ctx.beginPath();
    ctx.moveTo(-14 + lean * 2, -15 - crouch);
    ctx.lineTo(-28 + lean * 3 - Math.sin(poleAngle) * 15, 25 - crouch / 2);
    ctx.stroke();
    // Right pole
    ctx.beginPath();
    ctx.moveTo(14 + lean * 2, -15 - crouch);
    ctx.lineTo(28 + lean * 3 + Math.sin(poleAngle) * 15, 25 - crouch / 2);
    ctx.stroke();
    // Pole baskets
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.arc(-28 + lean * 3 - Math.sin(poleAngle) * 15, 25 - crouch / 2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(28 + lean * 3 + Math.sin(poleAngle) * 15, 25 - crouch / 2, 3, 0, Math.PI * 2);
    ctx.fill();

    // Legs (ski pants)
    ctx.fillStyle = '#1a1a2e';
    // Left leg
    ctx.beginPath();
    ctx.moveTo(-5 + lean, -5 - crouch);
    ctx.lineTo(-10 + lean * 1.5, 18 - crouch / 2);
    ctx.lineTo(-4 + lean * 1.5, 20 - crouch / 2);
    ctx.lineTo(0 + lean, -2 - crouch);
    ctx.fill();
    // Right leg
    ctx.beginPath();
    ctx.moveTo(5 + lean, -5 - crouch);
    ctx.lineTo(6 + lean * 1.5, 20 - crouch / 2);
    ctx.lineTo(12 + lean * 1.5, 18 - crouch / 2);
    ctx.lineTo(10 + lean, -2 - crouch);
    ctx.fill();

    // Boots
    ctx.fillStyle = '#333';
    ctx.fillRect(-12 + lean * 1.5, 17 - crouch / 2, 10, 6);
    ctx.fillRect(4 + lean * 1.5, 17 - crouch / 2, 10, 6);

    // Torso (jacket)
    const jacketGrad = ctx.createLinearGradient(-12, -35 - crouch, 12, -5 - crouch);
    jacketGrad.addColorStop(0, '#e63946');
    jacketGrad.addColorStop(1, '#c62828');
    ctx.fillStyle = jacketGrad;
    ctx.beginPath();
    ctx.moveTo(-12 + lean * 0.5, -5 - crouch);
    ctx.lineTo(-14 + lean * 0.3, -30 - crouch);
    ctx.quadraticCurveTo(0 + lean * 0.2, -38 - crouch, 14 + lean * 0.3, -30 - crouch);
    ctx.lineTo(12 + lean * 0.5, -5 - crouch);
    ctx.closePath();
    ctx.fill();

    // Jacket stripe
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(-10 + lean * 0.4, -20 - crouch, 20, 3);

    // Arms
    ctx.strokeStyle = '#e63946';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    // Left arm
    ctx.beginPath();
    ctx.moveTo(-13 + lean * 0.4, -25 - crouch);
    ctx.quadraticCurveTo(-20 + lean * 1.5, -15 - crouch, -14 + lean * 2, -15 - crouch);
    ctx.stroke();
    // Right arm
    ctx.beginPath();
    ctx.moveTo(13 + lean * 0.4, -25 - crouch);
    ctx.quadraticCurveTo(20 + lean * 1.5, -15 - crouch, 14 + lean * 2, -15 - crouch);
    ctx.stroke();

    // Gloves
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(-14 + lean * 2, -15 - crouch, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(14 + lean * 2, -15 - crouch, 3, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#ffd5b4';
    ctx.beginPath();
    ctx.arc(lean * 0.3, -38 - crouch, 8, 0, Math.PI * 2);
    ctx.fill();

    // Helmet
    ctx.fillStyle = '#e63946';
    ctx.beginPath();
    ctx.arc(lean * 0.3, -40 - crouch, 9, Math.PI, 0);
    ctx.fill();

    // Goggles
    ctx.fillStyle = '#ffa000';
    ctx.fillRect(-6 + lean * 0.3, -40 - crouch, 12, 4);
    ctx.fillStyle = 'rgba(255,200,0,0.5)';
    ctx.fillRect(-5 + lean * 0.3, -39 - crouch, 10, 2);

    ctx.restore();
}

// ============================================
// SNOW SPRAY PARTICLES (when turning)
// ============================================
function emitSpray() {
    const turnIntensity = Math.abs(state.turning);
    if (turnIntensity < 0.1) return;

    const skierScreenX = W / 2 + state.skierLean * 3;
    const skierScreenY = H * 0.65 + 22;
    const dir = state.turning > 0 ? -1 : 1;
    const count = Math.floor(3 + turnIntensity * 5 * (state.speed / 60));

    for (let i = 0; i < count; i++) {
        state.sprayParticles.push({
            x: skierScreenX + dir * (5 + Math.random() * 15),
            y: skierScreenY + Math.random() * 5 - 3,
            vx: dir * (2 + Math.random() * 6) * turnIntensity * (state.speed / 60),
            vy: -(1 + Math.random() * 4) * turnIntensity,
            life: 0.6 + Math.random() * 0.5,
            maxLife: 0.6 + Math.random() * 0.5,
            size: 2 + Math.random() * 5,
            rotation: Math.random() * Math.PI * 2
        });
    }
}

function updateSpray(dt) {
    for (let i = state.sprayParticles.length - 1; i >= 0; i--) {
        const p = state.sprayParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 3 * dt; // gravity
        p.vx *= 0.97;
        p.life -= dt;
        p.rotation += 0.1;
        if (p.life <= 0) {
            state.sprayParticles.splice(i, 1);
        }
    }
}

function drawSpray() {
    for (const p of state.sprayParticles) {
        const alpha = (p.life / p.maxLife) * 0.8;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillStyle = `rgba(240, 248, 255, ${alpha})`;
        ctx.beginPath();
        const s = p.size * (1 + (1 - p.life / p.maxLife) * 0.5);
        ctx.ellipse(0, 0, s, s * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();

        // Sparkle
        if (p.life / p.maxLife > 0.5) {
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.6})`;
            ctx.beginPath();
            ctx.arc(s * 0.3, -s * 0.3, 1, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }
}

// ============================================
// BOOST FLAME PARTICLES
// ============================================
function emitBoostParticles() {
    if (!state.boosting) return;
    const skierScreenX = W / 2 + state.skierLean * 3;
    const skierScreenY = H * 0.65 - 20;

    for (let i = 0; i < 2; i++) {
        state.boostParticles.push({
            x: skierScreenX + (Math.random() - 0.5) * 10,
            y: skierScreenY + 40,
            vx: (Math.random() - 0.5) * 2,
            vy: 2 + Math.random() * 3,
            life: 0.3 + Math.random() * 0.3,
            maxLife: 0.3 + Math.random() * 0.3,
            size: 3 + Math.random() * 4
        });
    }
}

function updateBoostParticles(dt) {
    for (let i = state.boostParticles.length - 1; i >= 0; i--) {
        const p = state.boostParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= dt;
        if (p.life <= 0) state.boostParticles.splice(i, 1);
    }
}

function drawBoostParticles() {
    for (const p of state.boostParticles) {
        const t = 1 - p.life / p.maxLife;
        const alpha = (1 - t) * 0.7;
        const r = 255;
        const g = Math.floor(150 + t * 100);
        const b = Math.floor(t * 50);
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (1 - t * 0.5), 0, Math.PI * 2);
        ctx.fill();
    }
}

// ============================================
// AMBIENT SNOW
// ============================================
function initSnow() {
    for (let i = 0; i < 80; i++) {
        state.snowParticles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            size: 1 + Math.random() * 3,
            speedX: (Math.random() - 0.5) * 1,
            speedY: 0.5 + Math.random() * 1.5,
            opacity: 0.3 + Math.random() * 0.5,
            wobble: Math.random() * Math.PI * 2
        });
    }
}

function updateSnow(dt) {
    const windEffect = state.speed * 0.02;
    for (const p of state.snowParticles) {
        p.wobble += dt * 2;
        p.x += p.speedX + Math.sin(p.wobble) * 0.5 + windEffect;
        p.y += p.speedY + state.speed * 0.05;
        if (p.y > H + 10) { p.y = -10; p.x = Math.random() * W; }
        if (p.x > W + 10) p.x = -10;
        if (p.x < -10) p.x = W + 10;
    }
}

function drawSnow() {
    for (const p of state.snowParticles) {
        ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ============================================
// GAME OBJECTS UPDATE
// ============================================
function worldToScreen(wx, wy) {
    const relY = wy - state.cameraY;
    const slopeTop = H * 0.45;
    const slopeRange = H - slopeTop;
    const normalizedY = relY / 800;
    const screenY = slopeTop + normalizedY * slopeRange;
    const perspective = normalizedY;
    const screenX = W / 2 + (wx - state.skierX) * perspective * 1.5;
    return { x: screenX, y: screenY, scale: Math.max(0.05, perspective) };
}

function updateTrees(dt) {
    state.treeSpawnTimer -= dt;
    if (state.treeSpawnTimer <= 0) {
        spawnTree();
        state.treeSpawnTimer = 0.15 + Math.random() * 0.3;
    }

    const moveSpeed = state.speed * 3;
    for (let i = state.trees.length - 1; i >= 0; i--) {
        const tree = state.trees[i];
        tree.y += moveSpeed * dt;
        if (tree.y > 1200) {
            state.trees.splice(i, 1);
            continue;
        }

        // Collision check
        const scr = worldToScreen(tree.x + state.skierX, tree.y);
        if (scr.y > H * 0.58 && scr.y < H * 0.72) {
            const dx = scr.x - W / 2;
            if (Math.abs(dx) < 18 * scr.scale + 8) {
                state.crashed = true;
            }
        }
    }
}

// ============================================
// GAME LOGIC
// ============================================
function update(dt) {
    if (state.crashed) return;

    state.time += dt;

    // Speed management
    const targetSpeed = state.boosting ? state.boostSpeed : state.maxSpeed;
    const accel = state.boosting ? 80 : 20;
    const decel = state.boosting ? 10 : 30;

    if (state.speed < targetSpeed) {
        state.speed += accel * dt;
    } else {
        state.speed -= decel * dt;
    }
    state.speed = Math.max(30, Math.min(state.boostSpeed, state.speed));

    // Turning
    if (state.turning !== 0) {
        state.skierTargetLean = state.turning * (40 + state.speed * 0.3);
    } else {
        state.skierTargetLean = 0;
    }

    state.skierLean += (state.skierTargetLean - state.skierLean) * dt * 5;
    state.skierX += state.skierLean * dt * 3;

    // Distance and score
    state.distance += state.speed * dt * 0.5;
    state.score += state.speed * dt * 0.1;

    // Update subsystems
    updateTrees(dt);
    updateSnow(dt);
    emitSpray();
    updateSpray(dt);
    emitBoostParticles();
    updateBoostParticles(dt);

    // Update HUD
    document.getElementById('speedDisplay').textContent = Math.round(state.speed);
    document.getElementById('distanceDisplay').textContent = Math.round(state.distance);
    document.getElementById('scoreDisplay').textContent = Math.round(state.score);
}

// ============================================
// RENDER
// ============================================
function render() {
    ctx.clearRect(0, 0, W, H);

    drawSky();
    drawMountains();
    drawValley();
    drawSlope();

    // Sort trees by Y for proper depth
    const sortedTrees = [...state.trees].sort((a, b) => a.y - b.y);

    // Draw trees behind skier
    for (const tree of sortedTrees) {
        const scr = worldToScreen(tree.x + state.skierX, tree.y);
        if (scr.y < H * 0.65) {
            drawTree(tree, scr.x, scr.y, scr.scale);
        }
    }

    // Draw boost particles behind skier
    drawBoostParticles();

    // Draw skier
    drawSkier();

    // Draw snow spray
    drawSpray();

    // Draw trees in front of skier
    for (const tree of sortedTrees) {
        const scr = worldToScreen(tree.x + state.skierX, tree.y);
        if (scr.y >= H * 0.65) {
            drawTree(tree, scr.x, scr.y, scr.scale);
        }
    }

    // Ambient snow on top
    drawSnow();

    // Speed vignette when boosting
    if (state.boosting || state.speed > 130) {
        const intensity = state.boosting ? 0.3 : (state.speed - 130) / 50 * 0.15;
        const vignette = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.8);
        vignette.addColorStop(0, 'rgba(0,0,0,0)');
        vignette.addColorStop(1, `rgba(0,0,0,${intensity})`);
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, W, H);

        // Motion blur lines
        ctx.strokeStyle = `rgba(255,255,255,${intensity * 0.5})`;
        ctx.lineWidth = 1;
        for (let i = 0; i < 8; i++) {
            const lx = Math.random() * W;
            ctx.beginPath();
            ctx.moveTo(lx, Math.random() * H * 0.5 + H * 0.3);
            ctx.lineTo(lx + (Math.random() - 0.5) * 10, H);
            ctx.stroke();
        }
    }
}

// ============================================
// CONTROLS
// ============================================
const keys = {};
const btnLeft = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');
const btnBoost = document.getElementById('btnBoost');

let touchLeft = false, touchRight = false, touchBoost = false;

function updateTurning() {
    if (keys['ArrowLeft'] || keys['a'] || keys['A'] || touchLeft) {
        state.turning = -1;
    } else if (keys['ArrowRight'] || keys['d'] || keys['D'] || touchRight) {
        state.turning = 1;
    } else {
        state.turning = 0;
    }
    state.boosting = keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W'] || touchBoost;
}

document.addEventListener('keydown', e => {
    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', ' ', 'a', 'd', 'w', 'A', 'D', 'W'].includes(e.key)) {
        e.preventDefault();
    }
    keys[e.key] = true;
    updateTurning();

    // Restart on crash
    if (state.crashed && (e.key === ' ' || e.key === 'Enter')) {
        restartGame();
    }
});

document.addEventListener('keyup', e => {
    keys[e.key] = false;
    updateTurning();
});

// Touch/pointer controls
function addButtonListeners(btn, onDown, onUp) {
    btn.addEventListener('mousedown', e => { e.preventDefault(); onDown(); });
    btn.addEventListener('mouseup', e => { e.preventDefault(); onUp(); });
    btn.addEventListener('mouseleave', e => { onUp(); });
    btn.addEventListener('touchstart', e => { e.preventDefault(); onDown(); btn.classList.add('active'); });
    btn.addEventListener('touchend', e => { e.preventDefault(); onUp(); btn.classList.remove('active'); });
    btn.addEventListener('touchcancel', e => { onUp(); btn.classList.remove('active'); });
}

addButtonListeners(btnLeft,
    () => { touchLeft = true; updateTurning(); },
    () => { touchLeft = false; updateTurning(); }
);
addButtonListeners(btnRight,
    () => { touchRight = true; updateTurning(); },
    () => { touchRight = false; updateTurning(); }
);
addButtonListeners(btnBoost,
    () => { touchBoost = true; updateTurning(); },
    () => { touchBoost = false; updateTurning(); }
);

// ============================================
// CRASH / RESTART
// ============================================
function showCrash() {
    document.getElementById('crash-stats').textContent =
        `Distanz: ${Math.round(state.distance)}m | Score: ${Math.round(state.score)} | Top Speed: ${Math.round(state.speed)} km/h`;
    document.getElementById('crash-overlay').classList.add('visible');
}

function restartGame() {
    document.getElementById('crash-overlay').classList.remove('visible');
    state.skierX = 0;
    state.skierLean = 0;
    state.skierTargetLean = 0;
    state.speed = 40;
    state.distance = 0;
    state.score = 0;
    state.boosting = false;
    state.turning = 0;
    state.crashed = false;
    state.trees = [];
    state.sprayParticles = [];
    state.boostParticles = [];
    state.treeSpawnTimer = 0;
    state.time = 0;
}

document.getElementById('btnRestart').addEventListener('click', restartGame);

// ============================================
// GAME LOOP
// ============================================
let lastTime = 0;

function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    update(dt);
    render();

    if (state.crashed) {
        showCrash();
    }

    requestAnimationFrame(gameLoop);
}

// Initialize
initSnow();
requestAnimationFrame(gameLoop);
</script>
