<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#1f3a2c"><title>Jackies Schach</title><style>:root{--bg:#f4f0e6;--card:#fffdf7;--ink:#172018;--green:#66845f;--cream:#eadfc7;--red:#b52a36;--gold:#f2c14e;--blue:#3879d9}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Rounded",system-ui,sans-serif}body{padding:max(12px,env(safe-area-inset-top)) 12px max(18px,env(safe-area-inset-bottom))}.app{max-width:620px;margin:auto}header,.status,.toolbar,.settings,.moves{width:min(96vw,600px);margin-left:auto;margin-right:auto}header{display:flex;justify-content:space-between;align-items:end;margin-bottom:10px}h1{font-size:clamp(28px,8vw,43px);letter-spacing:-.04em;line-height:.95;margin:0}.small{font-size:12px;text-align:right;color:#667066;font-weight:700}.status{display:flex;justify-content:space-between;gap:8px;align-items:center;background:var(--card);padding:11px 13px;border-radius:15px;margin-bottom:9px;box-shadow:0 5px 18px #0001;font-weight:800}.badge{font-size:11px;background:#e7efe8;padding:7px 9px;border-radius:999px;white-space:nowrap}.shell{width:min(96vw,600px);aspect-ratio:1;margin:auto;background:#29442f;padding:7px;border-radius:18px;box-shadow:0 14px 35px #0002;touch-action:manipulation}.board{width:100%;height:100%;display:grid;grid-template-columns:repeat(8,1fr);overflow:hidden;border-radius:12px}.sq{position:relative;border:0;padding:0;display:grid;place-items:center;font-size:clamp(31px,11vw,67px);line-height:1;font-family:"Arial Unicode MS","Segoe UI Symbol",sans-serif;touch-action:manipulation;user-select:none}.l{background:var(--cream)}.d{background:var(--green)}.piece.w{color:white;-webkit-text-stroke:1.2px #222;filter:drop-shadow(0 2px 1px #0005)}.piece.b{color:#111}.sel:after{content:"";position:absolute;inset:4px;border:4px solid var(--gold);border-radius:10px;pointer-events:none}.last:after{content:"";position:absolute;inset:0;background:#f2c14e44;pointer-events:none}.hint:before{content:"";position:absolute;width:25%;aspect-ratio:1;background:#1b995bbb;border-radius:50%;z-index:2;pointer-events:none}.capture:before{content:"";position:absolute;inset:7px;border:5px solid #bd2c3dcc;border-radius:50%;z-index:2;pointer-events:none}.threat:before{content:"";position:absolute;width:28%;aspect-ratio:1;background:#3879d9bb;border-radius:50%;z-index:2;pointer-events:none}.piece{position:relative;z-index:3}.toolbar{display:grid;grid-template-columns:2fr 1fr 1fr;gap:7px;margin-top:11px}.toolbar button,.settings select{min-height:45px;border:0;border-radius:13px;background:var(--card);font-weight:850;font-size:13px;box-shadow:0 4px 14px #0001}.toolbar .new{background:var(--red);color:#fff}.toolbar button:active{transform:scale(.98)}.toolbar .on{outline:3px solid #3879d955}.settings{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}.settings label{display:flex;justify-content:space-between;align-items:center;background:#fffdf7cc;border-radius:13px;padding:8px 10px;font-size:12px;font-weight:800;color:#667066}.settings select{min-height:32px;box-shadow:none;background:transparent;padding:0}.moves{background:#fffdf7cc;border-radius:14px;padding:10px 12px;margin-top:8px;font-size:12px;max-height:105px;overflow:auto}.moves b{display:block;margin-bottom:5px}.error{background:#ffe0e0;color:#8b1111;padding:12px;border-radius:12px;font-weight:800}.promo{position:fixed;inset:0;background:#0009;display:none;place-items:center;padding:20px;z-index:20}.promo.open{display:grid}.promo>div{background:var(--card);padding:18px;border-radius:20px;text-align:center}.promo h3{margin:0 0 12px}.promo button{font-size:42px;border:0;background:#eee7d7;border-radius:12px;min-width:66px;min-height:66px}@media(max-width:430px){.toolbar{grid-template-columns:1fr 1fr}.toolbar .new{grid-column:span 2}.settings{grid-template-columns:1fr}}</style></head><body><main class="app"><header><h1>Jackies Schach</h1><div class="small">Du spielst Weiß<br>gegen den Computer</div></header><div class="status"><span id="status">Spiel wird geladen …</span><span class="badge" id="badge">Weiß</span></div><div class="shell"><div class="board" id="board"></div></div><div class="toolbar"><button class="new" id="new">Neues Spiel</button><button id="undo">↶ Zurück</button><button id="threat">● Gegnerzüge</button></div><div class="settings"><label>Stärke<select id="level"><option value="1">Leicht</option><option value="2" selected>Mittel</option><option value="3">Schwer</option></select></label><label>Hinweise<select id="hints"><option value="1" selected>An</option><option value="0">Aus</option></select></label></div><div class="moves"><b>Züge</b><div id="log">Noch keine Züge.</div></div></main><div class="promo" id="promo"><div><h3>Bauernumwandlung</h3><button data-p="q">♕</button><button data-p="r">♖</button><button data-p="b">♗</button><button data-p="n">♘</button></div></div><script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script><script>(()=>{'use strict';const $=x=>document.getElementById(x),B=$('board'),S=$('status'),G=$('badge'),L=$('log'),H=$('hints'),T=$('threat'),P=$('promo'),glyph={wp:'♙',wn:'♘',wb:'♗',wr:'♖',wq:'♕',wk:'♔',bp:'♟',bn:'♞',bb:'♝',br:'♜',bq:'♛',bk:'♚'},val={p:100,n:320,b:330,r:500,q:900,k:0};let g,sel=null,legal=[],last=null,thinking=false,threats=new Set,pending=null;function init(){if(typeof Chess==='undefined'){S.innerHTML='<span class="error">Spiel konnte nicht geladen werden. Bitte Seite neu öffnen.</span>';return}g=new Chess;sel=null;legal=[];last=null;thinking=false;threats.clear();pending=null;P.classList.remove('open');render()}function pieceAt(sq){const p=g.get(sq);return p?glyph[p.color+p.type]:''}function allMoves(){return g.moves({verbose:true})}function status(){if(g.in_checkmate())return g.turn()==='w'?'Schachmatt – Computer gewinnt.':'Schachmatt – Du gewinnst!';if(g.in_draw())return'Remis.';if(thinking)return'Der Computer denkt …';if(g.in_check())return g.turn()==='w'?'Schach! Schütze deinen König.':'Computer steht im Schach.';return sel?legal.length+' mögliche Züge.':'Wähle eine weiße Figur.'}function render(){B.innerHTML='';const map=new Map(legal.map(m=>[m.to,m]));for(let r=8;r>=1;r--)for(let c=0;c<8;c++){const sq='abcdefgh'[c]+r,b=document.createElement('button'),p=g.get(sq);b.className='sq '+(((8-r+c)%2)?'d':'l');if(sel===sq)b.classList.add('sel');if(last&&(last.from===sq||last.to===sq))b.classList.add('last');if(H.value==='1'&&map.has(sq))b.classList.add(map.get(sq).captured?'capture':'hint');if(threats.has(sq))b.classList.add('threat');if(p){const x=document.createElement('span');x.className='piece '+p.color;x.textContent=pieceAt(sq);b.appendChild(x)}b.addEventListener('click',()=>tap(sq));B.appendChild(b)}S.textContent=status();G.textContent=g.game_over()?'Ende':(thinking?'Computer':'Du bist dran');L.textContent=g.history().length?g.history().map((m,i)=>(i%2===0?`${i/2+1}. `:'')+m+(i%2?'\n':'  ')).join(''):'Noch keine Züge.'}function tap(sq){if(thinking||g.game_over()||g.turn()!=='w')return;const target=legal.find(m=>m.to===sq);if(target){if(target.flags.includes('p')){pending=target;P.classList.add('open');return}play({from:target.from,to:target.to,promotion:'q'});computer();return}const p=g.get(sq);if(p&&p.color==='w'){sel=sq;legal=g.moves({square:sq,verbose:true});threats.clear();T.classList.remove('on')}else{sel=null;legal=[]}render()}function play(m){const x=g.move(m);if(!x)return;last=x;sel=null;legal=[];threats.clear();T.classList.remove('on');render()}function score(){let s=0;for(const row of g.board())for(const p of row)if(p)s+=(p.color==='w'?1:-1)*val[p.type];return s}function search(depth,a,b){if(depth===0||g.game_over())return score();const moves=allMoves().sort((x,y)=>(y.captured?val[y.captured]:0)-(x.captured?val[x.captured]:0));if(g.turn()==='w'){let best=-1e9;for(const m of moves){g.move(m);best=Math.max(best,search(depth-1,a,b));g.undo();a=Math.max(a,best);if(b<=a)break}return best}else{let best=1e9;for(const m of moves){g.move(m);best=Math.min(best,search(depth-1,a,b));g.undo();b=Math.min(b,best);if(b<=a)break}return best}}function computer(){if(g.game_over())return;thinking=true;render();setTimeout(()=>{const moves=allMoves();let chosen=moves[Math.floor(Math.random()*moves.length)],level=+$('level').value;if(level>1){let best=1e9,bestMoves=[];for(const m of moves){g.move(m);const s=search(level-1,-1e9,1e9);g.undo();if(s<best){best=s;bestMoves=[m]}else if(s===best)bestMoves.push(m)}chosen=bestMoves[Math.floor(Math.random()*bestMoves.length)]}thinking=false;play(chosen)},180)}$('new').onclick=init;$('undo').onclick=()=>{if(thinking)return;g.undo();g.undo();last=null;sel=null;legal=[];threats.clear();render()};T.onclick=()=>{if(thinking)return;threats.clear();if(!T.classList.toggle('on')){render();return}const fen=g.fen().split(' ');fen[1]='b';const t=new Chess(fen.join(' '));t.moves({verbose:true}).forEach(m=>threats.add(m.to));sel=null;legal=[];render()};H.onchange=render;P.querySelectorAll('button').forEach(b=>b.onclick=()=>{P.classList.remove('open');if(!pending)return;play({from:pending.from,to:pending.to,promotion:b.dataset.p});pending=null;computer()});init()})();</script></body></html>
